// ── SPEECH ────────────────────────────────────────────────────────
function speak(text,on){
  if(!on||!text||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='uk-UA';u.rate=0.85;u.pitch=0.7;u.volume=0.45; // вдвічі тихіше
  const v=window.speechSynthesis.getVoices();
  const uk=v.find(x=>x.lang.startsWith('uk'))||v.find(x=>x.lang.startsWith('ru'));
  if(uk)u.voice=uk;
  window.speechSynthesis.speak(u);
}

// ── SOUND ─────────────────────────────────────────────────────────
let AC=null;
function snd(t){
  try{
    if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    const C=AC,ts=C.currentTime,o=C.createOscillator(),g=C.createGain();
    o.connect(g);g.connect(C.destination);
    if(t==='swing'){o.type='sawtooth';o.frequency.setValueAtTime(200,ts);o.frequency.exponentialRampToValueAtTime(80,ts+.12);g.gain.setValueAtTime(.2,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.12);o.start(ts);o.stop(ts+.12);}
    else if(t==='hit'){const b=C.createBuffer(1,C.sampleRate*.04,C.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/400);const s=C.createBufferSource();s.buffer=b;const gg=C.createGain();gg.gain.value=.5;s.connect(gg);gg.connect(C.destination);s.start(ts);}
    else if(t==='hurt'){o.type='square';o.frequency.setValueAtTime(100,ts);o.frequency.exponentialRampToValueAtTime(50,ts+.25);g.gain.setValueAtTime(.25,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.25);o.start(ts);o.stop(ts+.25);}
    else if(t==='drop'){o.type='triangle';o.frequency.setValueAtTime(280,ts);o.frequency.exponentialRampToValueAtTime(70,ts+.3);g.gain.setValueAtTime(.18,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.3);o.start(ts);o.stop(ts+.3);}
    else if(t==='beacon'){[440,550,660,880].forEach((f,i)=>{const oo=C.createOscillator(),gg=C.createGain();oo.type='sine';oo.frequency.value=f;oo.connect(gg);gg.connect(C.destination);const st=ts+i*.07;gg.gain.setValueAtTime(0,st);gg.gain.linearRampToValueAtTime(.15,st+.04);gg.gain.exponentialRampToValueAtTime(.001,st+.35);oo.start(st);oo.stop(st+.35);});}
    else if(t==='dot'){o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.15,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.07);o.start(ts);o.stop(ts+.07);}
    else if(t==='dash'){o.type='sine';o.frequency.value=660;g.gain.setValueAtTime(.15,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.18);o.start(ts);o.stop(ts+.18);}
    else if(t==='spell'){[330,440,550,660,550].forEach((f,i)=>{const oo=C.createOscillator(),gg=C.createGain();oo.type='sine';oo.frequency.value=f;oo.connect(gg);gg.connect(C.destination);const st=ts+i*.06;gg.gain.setValueAtTime(.18,st);gg.gain.exponentialRampToValueAtTime(.001,st+.12);oo.start(st);oo.stop(st+.12);});}
    else if(t==='wave'){o.type='triangle';o.frequency.setValueAtTime(110,ts);o.frequency.exponentialRampToValueAtTime(220,ts+.45);g.gain.setValueAtTime(.2,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.45);o.start(ts);o.stop(ts+.45);}
    else if(t==='death'){o.type='sine';o.frequency.setValueAtTime(440,ts);o.frequency.exponentialRampToValueAtTime(110,ts+.9);g.gain.setValueAtTime(.3,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.9);o.start(ts);o.stop(ts+.9);}
  }catch(e){}
}

const DIFFICULTY={
  very_easy:{name:'Дуже легко',  col:'#22c55e',enemyHp:0.5, enemyDmg:0.5, playerHp:1.5, staminaDrain:0.5},

const OBJ_TYPES={
  pillar:{sym:'▪',col:'#6b7280',destructible:false,blocksMove:true,desc:'Стовп'},
  wall:  {sym:'▬',col:'#475569',destructible:false,blocksMove:true,desc:'Стіна'},

  upg_reach:    {sym:'🔭',col:'#60a5fa',destructible:false,blocksMove:false,isLoot:true,upg:'reach',    desc:'Дальність +1 клітинка'},
  upg_weight:   {sym:'🌬',col:'#22c55e',destructible:false,blocksMove:false,isLoot:true,upg:'weight',   desc:'Вага -15%'},
  upg_sharpness:{sym:'⚡',col:'#f59e0b',destructible:false,blocksMove:false,isLoot:true,upg:'sharpness',desc:'Гострота +25%'},
  upg_hp:       {sym:'❤', col:'#ef4444',destructible:false,blocksMove:false,isLoot:true,upg:'hp',       desc:'MaxHP +20'},
  upg_spell:    {sym:'📜',col:'#e879f9',destructible:false,blocksMove:false,isLoot:true,upg:'spell',    desc:'Нове заклинання'},
};
const BOSS_DEFS={
  colossus:  {name:'КОЛОС',    col:'#f97316',sym:'⬡',basehp:60, dmg:22,ms:700,size:2},
  wraith:    {name:'ПРИМАРА',  col:'#d946ef',sym:'◈',basehp:40, dmg:15,ms:320,size:1},
  juggernaut:{name:'ДРЕДНОУТ', col:'#dc2626',sym:'◼',basehp:120,dmg:35,ms:950,size:3},

};
const UNLOCKABLE_SPELLS=SPELLS.filter(s=>s.code!=='.'&&s.code!=='-').map(s=>s.code);
function coordId(x,y){return x+','+y;}
function calcRoomNum(x,y){return 1+Math.abs(x)+Math.abs(y);}
function getNextCoord(coord,dir){const{x,y}=coord;if(dir==='N')return{x,y:y-1};if(dir==='S')return{x,y:y+1};if(dir==='E')return{x:x+1,y};if(dir==='W')return{x:x-1,y};return coord;}
function calcBossCells(bx,by,size){const c=[];for(let dy=0;dy<size;dy++)for(let dx=0;dx<size;dx++)c.push({x:bx+dx,y:by+dy});return c;}
function generateRoom(roomNum,spawnX,spawnY,diff){
  const isBoss=roomNum>1&&roomNum%3===0;
  const _dCfg=DIFFICULTY[diff||'normal']||DIFFICULTY.normal;
  const occ=[{x:spawnX??CX,y:spawnY??CY}];
  const objects=[];
  const objCount=isBoss?4:Math.min(2+Math.floor(roomNum/2),8);
  for(let i=0;i<objCount*5&&objects.length<objCount;i++){
    const x=1+Math.floor(Math.random()*(G-2));const y=1+Math.floor(Math.random()*(G-2));
    if(occ.some(o=>Math.abs(o.x-x)+Math.abs(o.y-y)<3))continue;
    const t=isBoss?'pillar':['pillar','wall','crate','barrel'][Math.floor(Math.random()*4)];
    const ot=OBJ_TYPES[t];if(!ot)continue;
    objects.push({id:EID++,type:t,x,y,hp:ot.hp??null});occ.push({x,y});
  }
  if(!isBoss){
    // 2 guaranteed unique loot items per room, no duplicate types
    const lootKeys=Object.keys(OBJ_TYPES).filter(k=>OBJ_TYPES[k].isLoot);
    const picks=[...lootKeys].sort(()=>Math.random()-.5).slice(0,2);
    for(const lt of picks){
      for(let i=0;i<40;i++){
        const x=1+Math.floor(Math.random()*(G-2));
        const y=1+Math.floor(Math.random()*(G-2));
        if(occ.some(o=>Math.abs(o.x-x)+Math.abs(o.y-y)<2))continue;
        objects.push({id:EID++,type:lt,x,y,hp:null});occ.push({x,y});break;
      }
    }
  }
  let enemies=[];
  if(isBoss){
    const bossRoomIdx=Math.floor(roomNum/3); // 1=room3, 2=room6, 3=room9...
    const scale=Math.max(1,1+(bossRoomIdx-1)*0.7); // steeper scaling: +70% per boss tier
    const numBosses=bossRoomIdx>=2?2:1; // 2 bosses from room 6 onward
    enemies=[];
    const usedBossPos=[];
    for(let b=0;b<numBosses;b++){
      const bKeys=Object.keys(BOSS_DEFS);
      const bType=bKeys[Math.floor(Math.random()*bKeys.length)];
      const bd=BOSS_DEFS[bType];
      // Position: boss 0 top-left area, boss 1 bottom-right area
      let bx,by;
      if(numBosses===1){
        bx=Math.max(0,Math.min(G-bd.size,Math.floor(G/2)-Math.floor(bd.size/2)));
        by=Math.max(0,Math.min(G-bd.size,Math.floor(G/2)-Math.floor(bd.size/2)));
      }else{
        const offsets=[[1,1],[G-bd.size-1,G-bd.size-1]];
        const[ox,oy]=offsets[b%2];
        bx=Math.max(0,Math.min(G-bd.size,ox));
        by=Math.max(0,Math.min(G-bd.size,oy));
      }
      // Avoid overlap with other boss
      if(usedBossPos.some(p=>Math.abs(p.x-bx)+Math.abs(p.y-by)<4)) bx=Math.min(G-bd.size,bx+3);
      usedBossPos.push({x:bx,y:by});
      enemies.push({id:EID++,type:'boss',bossType:bType,x:bx,y:by,
        hp:Math.round(bd.basehp*scale*_dCfg.enemyHp),
        maxHp:Math.round(bd.basehp*scale*_dCfg.enemyHp),
        dmg:Math.round(bd.dmg*scale*_dCfg.enemyDmg),
        ms:Math.round(bd.ms/Math.sqrt(scale)),
        size:bd.size,col:bd.col,sym:bd.sym,name:bd.name,lastMove:0,
        bossRoomIdx}); // store tier for loot scaling
    }
  }else{
    const etAll=Object.keys(ET);const etAvail=etAll.slice(0,Math.min(etAll.length,1+Math.floor(roomNum/2)));
    const count=Math.max(1,Math.round(1+roomNum*0.55));const spOcc=[...occ];
    for(let i=0;i<count;i++){const t=etAvail[Math.floor(Math.random()*etAvail.length)];const e=spawnE(t,spOcc);if(e){enemies.push(e);spOcc.push({x:e.x,y:e.y});}}
    // Apply difficulty HP scaling
    const _hm=_dCfg.enemyHp;
    enemies=enemies.map(e=>({...e,hp:Math.max(1,Math.round(e.hp*_hm)),maxHp:Math.max(1,Math.round(e.hp*_hm))}));
  }
  return{objects,enemies,isBoss};
}

function getWCells(px,py,yi,wk,extraReach=0){
  const w=WPN[wk],cells=[];
  if(w.sweep){
  for(let d=0;d<8;d++){
    const[dx,dy]=DIR[d];
    for(let r=1;r<=1+extraReach;r++){
      const nx=px+dx*r,ny=py+dy*r;
      if(nx>=0&&nx<G&&ny>=0&&ny<G)cells.push({x:nx,y:ny,main:r===1,extra:r>1});
    }
  }
  return cells;
}
  const[dx,dy]=DIR[yi];
  // Base reach + extra cells from upgrades (extra cells deal full damage)
  for(let r=1;r<=w.reach+extraReach;r++){
    const nx=px+dx*r,ny=py+dy*r;
    if(nx>=0&&nx<G&&ny>=0&&ny<G)
      cells.push({x:nx,y:ny,main:r<=1,extra:r>w.reach});
  }
  for(let s=-w.arc;s<=w.arc;s++){if(!s)continue;const ai=(yi+s+8)%8;const[ax,ay]=DIR[ai];const nx=px+ax,ny=py+ay;if(nx>=0&&nx<G&&ny>=0&&ny<G)cells.push({x:nx,y:ny,main:false});}
  return cells;
}
function spawnE(type,occ){
  const edges=[];for(let x=0;x<G;x++){edges.push({x,y:0});edges.push({x,y:G-1});}for(let y=1;y<G-1;y++){edges.push({x:0,y});edges.push({x:G-1,y});}
  const free=edges.filter(c=>!occ.some(o=>o.x===c.x&&o.y===c.y));if(!free.length)return null;
  const p=free[Math.floor(Math.random()*free.length)];
  return{id:EID++,type,x:p.x,y:p.y,hp:ET[type].hp,maxHp:ET[type].hp,lastMove:0};
}
function toScreen(gx,gy,px,py,cDeg){const rx=gx-px,ry=gy-py,a=-rad(cDeg);return{sx:Math.round(CX+rx*Math.cos(a)-ry*Math.sin(a)),sy:Math.round(CY+rx*Math.sin(a)+ry*Math.cos(a))};}
// Inverse of toScreen: screen cell → world cell
function fromScreen(sx,sy,px,py,cDeg){
  const rx=sx-CX,ry=sy-CY,a=rad(cDeg);
  return{gx:Math.round(px+rx*Math.cos(a)-ry*Math.sin(a)),gy:Math.round(py+rx*Math.sin(a)+ry*Math.cos(a))};
}
function swipeToWorld(sdx,sdy,cDeg){const a=rad(cDeg);return{gdx:Math.round(sdx*Math.cos(a)-sdy*Math.sin(a)),gdy:Math.round(sdx*Math.sin(a)+sdy*Math.cos(a))};}
function betaToPitch(b,sens){return clamp((b-40)/sens,-1,1);}
function pColor(p){return p<-0.3?'#22c55e':p>0.3?'#ef4444':'#f59e0b';}

// ── MORSE BAR (завжди видимий) ────────────────────────────────────
function SpellChip({sp,currentSeq,unlocked}){
  const locked=unlocked&&!unlocked.includes(sp.code);
  const active=!locked&&currentSeq&&sp.code.startsWith(currentSeq);
  return(<div style={{width:'calc(12.5% - 3px)',opacity:locked?0.22:1,background:active?sp.col+'22':'#060f1e',border:`1px solid ${active?sp.col:locked?'#0a1628':'#1e3a5f'}`,borderRadius:'3px',padding:'2px 3px',textAlign:'center',transition:'background .2s'}}>
    <div style={{fontSize:'8px'}}>{locked?'🔒':sp.code.split('').map((s,i)=><span key={i} style={{color:s==='.'?'#60a5fa':'#f59e0b'}}>{s}</span>)}</div>
    <div style={{fontSize:'7px',color:locked?'#1e3a5f':sp.col,overflow:'hidden',whiteSpace:'nowrap'}}>{locked?'???':sp.name}</div>
  </div>);
}
function MorseBar({currentSeq,unlocked}){
  return(
    <div style={{width:'100%',maxWidth:'480px',padding:'3px 8px 4px',display:'flex',flexWrap:'wrap',gap:'3px',flexShrink:0}}>
      {SPELLS.map(sp=>(
        <SpellChip key={sp.code} sp={sp} currentSeq={currentSeq} unlocked={unlocked}/>
      ))}
    </div>
  );
}

// ── SETTINGS ──────────────────────────────────────────────────────
function Sec({title,children}){return(<div style={{background:'#060f1e',border:'1px solid #1e3a5f',borderRadius:'7px',padding:'11px',marginBottom:'9px'}}><div style={{fontSize:'9px',color:'#1e3a5f',letterSpacing:'.12em',marginBottom:'9px'}}>{title}</div>{children}</div>);}
function B2({children,onClick,col='#60a5fa',style={}}){return(<button onClick={onClick} style={{width:'100%',padding:'11px',background:col+'22',border:`1px solid ${col}`,color:col,borderRadius:'6px',cursor:'pointer',fontSize:'12px',fontFamily:"'Courier New',monospace",letterSpacing:'.06em',...style}}>{children}</button>);}

function Settings({s,setS,sPhase,setSPhase,onBack}){
  const[live,setLive]=useState({beta:0,compass:0,mag:9.8});
  useEffect(()=>{
    if(sPhase!=='active')return;
    const o=(e)=>{let c=live.compass;if(e.webkitCompassHeading!=null)c=e.webkitCompassHeading;setLive(p=>({...p,beta:e.beta??0,compass:c}));};
    const oa=(e)=>{if(e.alpha!=null)setLive(p=>({...p,compass:(360-e.alpha)%360}));};
    const m=(e)=>{const g=e.accelerationIncludingGravity;if(!g)return;setLive(p=>({...p,mag:Math.sqrt((g.x??0)**2+(g.y??0)**2+(g.z??9.8)**2)}));};
    window.addEventListener('deviceorientation',o,true);window.addEventListener('deviceorientationabsolute',oa,true);window.addEventListener('devicemotion',m);
    return()=>{window.removeEventListener('deviceorientation',o,true);window.removeEventListener('deviceorientationabsolute',oa,true);window.removeEventListener('devicemotion',m);};
  },[sPhase]);
  const pv=betaToPitch(live.beta,s.pitchSens);
  // sensor request moved to Warning component
    return(
    <div style={{background:'#010d1f',flex:1,overflow:'auto',fontFamily:"'Courier New',monospace",padding:'14px',color:'#c5d8f0'}}>
      <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'14px'}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'#4a6a9f',fontSize:'22px',cursor:'pointer',padding:'4px'}}>←</button>
        <div style={{color:'#3a6a9f',fontSize:'15px',fontWeight:'bold'}}>НАЛАШТУВАННЯ</div>
      </div>
      <Sec title="ДАТЧИКИ">
        {sPhase==='active'&&<>
          <div style={{color:'#22c55e',fontSize:'10px',marginBottom:'6px'}}>◉ АКТИВНІ</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'5px'}}>
            {[['β нахил',live.beta.toFixed(1)+'°',pColor(pv)],['компас',live.compass.toFixed(0)+'°','#60a5fa'],['|a|',live.mag.toFixed(1),'#f59e0b']].map(([l,v,c])=>(
              <div key={l} style={{background:'#020c1a',borderRadius:'4px',padding:'6px',textAlign:'center'}}><div style={{fontSize:'8px',color:'#1e3a5f'}}>{l}</div><div style={{fontSize:'14px',color:c,fontWeight:'bold'}}>{v}</div></div>
            ))}
          </div>
        </>}
        {sPhase==='denied'&&<div style={{color:'#ef4444',fontSize:'10px'}}>⚠ Відхилено. Доступні WASD + клавіатура.<br/><span style={{color:'#334155',fontSize:'9px'}}>Перезапусти гру щоб спробувати знову.</span></div>}
        {(sPhase==='idle'||sPhase==='req')&&<div style={{color:'#4a6a9f',fontSize:'10px'}}>○ Датчики підключаються на екрані попередження при запуску.</div>}
      </Sec>

      <Sec title="СКЛАДНІСТЬ">
        <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>
          {Object.entries(DIFFICULTY).map(([key,d])=>(
            <button key={key} onClick={()=>setS(p=>({...p,difficulty:key}))} style={{padding:'6px 10px',flex:'1 1 calc(33% - 5px)',background:s.difficulty===key?d.col+'22':'#020c1a',border:`1px solid ${s.difficulty===key?d.col:'#1e3a5f'}`,color:s.difficulty===key?d.col:'#334155',borderRadius:'5px',cursor:'pointer',fontFamily:'inherit',fontSize:'9px',fontWeight:s.difficulty===key?'bold':'normal'}}>
              {d.name}
            </button>
          ))}
        </div>
      </Sec>
      <Sec title="РЕЖИМ">
        <div style={{display:'flex',gap:'6px'}}>
          {[['classic','Класика','Рух гравця'],['radar','Радар','Центр екрану'],['panorama','Панорама','3D вигляд']].map(([val,lbl,desc])=>(
            <button key={val} onClick={()=>setS(p=>({...p,worldMode:val}))} style={{flex:1,padding:'8px 6px',background:s.worldMode===val?'#1e3a8a33':'#060f1e',border:`1px solid ${s.worldMode===val?'#3b82f6':'#1e3a5f'}`,color:s.worldMode===val?'#60a5fa':'#334155',borderRadius:'6px',cursor:'pointer',fontFamily:'inherit',fontSize:'10px',lineHeight:1.5,textAlign:'left'}}>
              <div style={{fontWeight:'bold'}}>{lbl}</div><div style={{fontSize:'8px',marginTop:'2px'}}>{desc}</div>
            </button>
          ))}
        </div>
      </Sec>
      <Sec title={`ПОРІГ УДАРУ — ${s.strikeThr} m/s²`}>
        <input type="range" min="3" max="20" value={s.strikeThr} onChange={e=>setS(p=>({...p,strikeThr:+e.target.value}))}/>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'8px',color:'#1e3a5f',marginTop:'3px'}}><span>Легкий (3)</span><span>Сильний (20)</span></div>
        {sPhase==='active'&&<div style={{marginTop:'5px',height:'5px',background:'#020c1a',borderRadius:'3px',overflow:'hidden'}}><div style={{height:'100%',width:`${clamp((live.mag-9.8)/s.strikeThr*100,0,100)}%`,background:'#f59e0b',transition:'width .05s'}}/></div>}
      </Sec>
      <Sec title={`ЧУТЛИВІСТЬ НАХИЛУ — ±${s.pitchSens}°`}>
        <input type="range" min="15" max="60" value={s.pitchSens} onChange={e=>setS(p=>({...p,pitchSens:+e.target.value}))}/>
        {sPhase==='active'&&<div style={{marginTop:'5px',display:'flex',alignItems:'center',gap:'6px'}}><div style={{flex:1,height:'5px',background:'#020c1a',borderRadius:'3px',overflow:'hidden'}}><div style={{height:'100%',width:`${((pv+1)/2)*100}%`,background:pColor(pv),transition:'width .05s'}}/></div><div style={{fontSize:'9px',color:pColor(pv),minWidth:'46px'}}>{pv<-0.3?'REST':pv>0.3?'CHARGE':'HOLD'}</div></div>}
      </Sec>
      <Sec title="ГОЛОС КОМПАНЬЙОНА">
        <div style={{display:'flex',gap:'8px',marginBottom:'6px'}}>
          <button onClick={()=>setS(p=>({...p,voice:true}))} style={{flex:1,padding:'8px',background:s.voice?'#1e3a8a33':'#060f1e',border:`1px solid ${s.voice?'#3b82f6':'#1e3a5f'}`,color:s.voice?'#60a5fa':'#334155',borderRadius:'6px',cursor:'pointer',fontFamily:'inherit',fontSize:'10px'}}>🔊 Увімкнений</button>
          <button onClick={()=>setS(p=>({...p,voice:false}))} style={{flex:1,padding:'8px',background:!s.voice?'#1e3a8a33':'#060f1e',border:`1px solid ${!s.voice?'#3b82f6':'#1e3a5f'}`,color:!s.voice?'#60a5fa':'#334155',borderRadius:'6px',cursor:'pointer',fontFamily:'inherit',fontSize:'10px'}}>🔇 Вимкнений</button>
        </div>
        <button onClick={()=>speak('Я готовий. Підніми мене.',true)} style={{width:'100%',padding:'6px',background:'#060f1e',border:'1px solid #1e3a5f',color:'#4a6a9f',borderRadius:'4px',cursor:'pointer',fontFamily:'inherit',fontSize:'9px'}}>▶ Тест голосу</button>
      </Sec>
      <Sec title="СТАРТОВА ЗБРОЯ">
        <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
          {Object.entries(WPN).map(([k,w])=>(
            <button key={k} onClick={()=>setS(p=>({...p,startWpn:k}))} style={{display:'flex',justifyContent:'space-between',padding:'8px 10px',background:s.startWpn===k?'#14532d33':'#060f1e',border:`1px solid ${s.startWpn===k?'#22c55e':'#1e3a5f'}`,color:s.startWpn===k?'#22c55e':'#334155',borderRadius:'5px',cursor:'pointer',fontFamily:'inherit',fontSize:'10px'}}>
              <span>{w.label}</span><span style={{fontSize:'8px',color:'#1e3a5f'}}>{w.desc}</span>
            </button>
          ))}
        </div>
      </Sec>
      <B2 onClick={onBack} col='#22c55e' style={{marginTop:'6px'}}>✓ ГОТОВО</B2>
    </div>
  );
}

// ── GAME ──────────────────────────────────────────────────────────
function Game({gmode,settings,sPhase,onDead}){
  const gs=useRef(null);
  const[,forceRender]=useReducer(x=>x+1,0);
  const morseTimer=useRef(null);
  const touchStart=useRef({x:0,y:0,t:0,onBtn:false});
  const prevAccMag=useRef(9.8);
  const lastStrikeT=useRef(0);
  const isRadar=settings.worldMode==='radar';
  const isPanorama=settings.worldMode==='panorama';
  const STRENGTH=4;

  // ══ REFS для гейм-лупу — уникаємо stale closure ══
  const onDeadRef=useRef(onDead);
  const settingsRef=useRef(settings);
  const gmodeRef=useRef(gmode);
  const isRadarRef=useRef(isRadar);
  useEffect(()=>{onDeadRef.current=onDead;},[onDead]);
  useEffect(()=>{settingsRef.current=settings;},[settings]);
  useEffect(()=>{gmodeRef.current=gmode;},[gmode]);
  useEffect(()=>{isRadarRef.current=isRadar;},[isRadar]);

  const setMsg=useCallback((text)=>{
    const g=gs.current;if(!g)return;
    g.msg=text;g.msgKey=(g.msgKey||0)+1;
    speak(text,settingsRef.current.voice);
    forceRender();
  },[]);
  const setMsgRef=useRef(setMsg);
  useEffect(()=>{setMsgRef.current=setMsg;},[setMsg]);

  // ── Init ────────────────────────────────────────────────────
  useEffect(()=>{
    EID=0;
    gs.current={
      player:(()=>{const dCfg=DIFFICULTY[settings.difficulty||'normal']||DIFFICULTY.normal;const hp=Math.round(100*dCfg.playerHp);return{x:CX,y:CY,hp,maxHp:hp};})(),
      enemies:[],
      yawIdx:0,compassD:0,vYaw:0,pitch:0,prevYawIdx:0,
      stamina:100,fingers:5,
      dropped:false,droppedUntil:0,
      wave:0,score:0,
      objects:[],roomCoord:{x:0,y:0},roomMap:{},roomNumber:1,isBossRoom:false,
      transitioning:false,edgeTimer:0,peekDir:null,peekInfo:null,_roomCleared:false,
      weaponMods:{reach:0,weight:1,sharpness:1},unlockedSpells:['.'],
      divergence:0,highDTicks:0,
      beaconCount:0,beaconProgress:0,
      spell:null,
      flash:[],flashUntil:0,
      msg:'',msgKey:0,waveMsg:'',
      tutStep:0,tutDone:{moved:false,rotated:false,pitched:false,attacked:false,beaconed:false,morsed:false},
      morseSeq:'',
      _waveTimer:null,
    };

    if(gmode==='tutorial'){
      setTimeout(()=>setMsg('...'),1500);
      setTimeout(()=>setMsg(TUT[1].msg),4500);
      setTimeout(()=>{const g=gs.current;if(!g)return;g.tutStep=2;setMsg(TUT[2].msg);},8500);
    }
    if(gmode==='adventure'){
      EID=100;const g0=gs.current;
      const ac=generateRoom(1,CX,CY,settings.difficulty);
      g0.enemies=ac.enemies;g0.objects=ac.objects;g0.isBossRoom=ac.isBoss;
      g0.roomCoord={x:0,y:0};g0.roomNumber=1;
      g0.roomMap={[coordId(0,0)]:{enemies:ac.enemies,objects:ac.objects,isBoss:ac.isBoss,cleared:false,visited:true}};
      setTimeout(()=>setMsg('Кімната 1 — стань на краю 4с → наступна кімната'),800);
      forceRender();
    }
    if(gmode==='survival'){
      gs.current.wave=1;gs.current.waveMsg='Хвиля 1';snd('wave');forceRender();
      gs.current._waveTimer=setTimeout(()=>{gs.current._waveTimer=null;doSpawnWave(1);},2000);
    }
    return()=>{
      const g=gs.current;if(g&&g._waveTimer){clearTimeout(g._waveTimer);g._waveTimer=null;}
      clearTimeout(morseTimer.current);
    };
  },[]);// eslint-disable-line

  // ── Spawn wave ───────────────────────────────────────────────
  const doSpawnWave=useCallback((waveNum)=>{
    const g=gs.current;if(!g)return;
    const wi=Math.min(waveNum-1,WAVES.length-1);
    const extra=Math.max(0,waveNum-WAVES.length);
    const spawned=[];
    WAVES[wi].forEach(({t,n})=>{
      const tot=n+(t==='shadow'?extra:0);
      for(let i=0;i<tot;i++){const e=spawnE(t,[{x:g.player.x,y:g.player.y},...spawned]);if(e)spawned.push(e);}
    });
    // Apply difficulty scaling to wave enemies
    const _wdCfg=DIFFICULTY[settingsRef.current.difficulty||'normal']||DIFFICULTY.normal;
    g.enemies=spawned.map(e=>({...e,hp:Math.max(1,Math.round(e.hp*_wdCfg.enemyHp)),maxHp:Math.max(1,Math.round(e.hp*_wdCfg.enemyHp))}));
    g.waveMsg='';
    setMsg(`Хвиля ${waveNum} · ${spawned.length} ворогів`);
    snd('wave');forceRender();
  },[setMsg]);
  const doSpawnRef=useRef(doSpawnWave);
  useEffect(()=>{doSpawnRef.current=doSpawnWave;},[doSpawnWave]);

  // ── Spell ────────────────────────────────────────────────────
  const castSpell=useCallback((sp)=>{
    const g=gs.current;if(!g)return;snd('spell');
    const fn=sp.fn,now=Date.now();
    if(fn==='stamina'){g.stamina=Math.min(100,g.stamina+30);}
    else if(fn==='mend'){g.fingers=Math.min(5,g.fingers+1);}
    else if(fn==='heal'){g.player={...g.player,hp:Math.min(g.player.maxHp,g.player.hp+30)};}
    else if(fn==='cure'){g.player={...g.player,hp:Math.min(g.player.maxHp,g.player.hp+50)};}
    else if(fn==='omni'){doAttackInternal(true);}
    else if(fn==='teleport'){const[dx,dy]=DIR[g.yawIdx];g.player={...g.player,x:clamp(g.player.x+dx*3,0,G-1),y:clamp(g.player.y+dy*3,0,G-1)};}
    else if(fn==='freeze'){const near=g.enemies.reduce((b,e)=>{const d=Math.abs(e.x-g.player.x)+Math.abs(e.y-g.player.y);return(!b||d<b.d)?{e,d}:b;},null);if(near)g.enemies=g.enemies.map(e=>e.id===near.e.id?{...e,frozen:now+3000}:e);}
    else if(fn==='lockall'){g.enemies=g.enemies.map(e=>({...e,frozen:now+4000}));}
    else if(fn==='chaos'){g.enemies=g.enemies.map(e=>({...e,chaosUntil:now+5000}));}
    else{g.spell={fn,col:sp.col,name:sp.name,expires:now+5000};}
    setMsg(`✨ ${sp.name}! ${sp.desc}`);
    if(gmodeRef.current==='tutorial'&&!g.tutDone.morsed){
      g.tutDone.morsed=true;if(g.tutStep===7){g.tutStep=8;setTimeout(()=>setMsg(TUT[8].msg),800);}
    }
    forceRender();
  },[setMsg]);

  // ── Attack ────────────────────────────────────────────────────
  function doAttackInternal(omni){
    const g=gs.current;if(!g||g.dropped||g.stamina<4)return;
    snd('swing');
    const yi=omni?0:g.yawIdx;const wk=omni?'flail':settingsRef.current.startWpn;
    const cells=getWCells(g.player.x,g.player.y,yi,wk,gs.current?.weaponMods?.reach||0);
    const wMods=gs.current?.weaponMods||{reach:1,weight:1,sharpness:1};
    const C=STRENGTH*wMods.sharpness/(WPN[settingsRef.current.startWpn].w*wMods.weight);
    const chargeMult=1+Math.max(0,g.pitch)*1.8;
    const spellMult=(g.spell?.fn==='burn'?3:g.spell?.fn==='surge'?2:1);
    const baseDmg=Math.round(12*chargeMult*C*spellMult);
    if(g.spell?.fn==='burn'||g.spell?.fn==='surge')g.spell=null;
    let hits=0;
    g.enemies=g.enemies.map(e=>{
      if(e.type==='boss'){const bc=calcBossCells(e.x,e.y,e.size);if(!bc.some(b=>cells.find(c=>c.x===b.x&&c.y===b.y)))return e;hits++;if(e.hp-baseDmg<=0){
          const bTier=e.bossRoomIdx||1;
          g.score+=100*bTier;snd('wave');
          // Drop boss loot based on tier
          const lKeys=Object.keys(OBJ_TYPES).filter(k=>OBJ_TYPES[k].isLoot);
          const dropCount=2+bTier; // tier1=3, tier2=4, tier3=5 drops
          const drops=[...lKeys].sort(()=>Math.random()-.5).slice(0,dropCount);
          const usedP=[...g.enemies.filter(x=>x.id!==e.id).map(x=>({x:x.x,y:x.y})),...(g.objects||[]).map(o=>({x:o.x,y:o.y}))];
          const newLoot=[];
          for(const lt of drops){
            for(let t=0;t<40;t++){
              const lx=1+Math.floor(Math.random()*(G-2));const ly=1+Math.floor(Math.random()*(G-2));
              if(usedP.some(p=>Math.abs(p.x-lx)+Math.abs(p.y-ly)<2))continue;
              newLoot.push({id:EID++,type:lt,x:lx,y:ly,hp:null});usedP.push({x:lx,y:ly});break;
            }
          }
          if(newLoot.length>0){g.objects=[...(g.objects||[]),...newLoot];setMsgRef.current?.(`👹 Тир ${bTier} переможено! 💎×${newLoot.length}`);}
          return null;
        }return{...e,hp:e.hp-baseDmg};}
      const cell=cells.find(c=>c.x===e.x&&c.y===e.y);if(!cell)return e;
      hits++;const dmg=cell.main?baseDmg:Math.round(baseDmg*.5);
      if(e.hp-dmg<=0){g.score+=10;return null;}
      return{...e,hp:e.hp-dmg};
    }).filter(Boolean);
    if(gmodeRef.current==='adventure'&&g.objects?.length){
      let clank=false;
      g.objects=g.objects.map(obj=>{
        const hit=cells.find(c=>c.x===obj.x&&c.y===obj.y);if(!hit)return obj;
        const ot=OBJ_TYPES[obj.type];if(!ot||ot.isLoot)return obj;
        if(!ot.destructible){clank=true;return obj;}
        const nhp=(obj.hp||1)-(hit.main?baseDmg:Math.round(baseDmg*.5));
        if(nhp<=0){g.score+=5;if(ot.explodes){const area=[{x:obj.x,y:obj.y},{x:obj.x+1,y:obj.y},{x:obj.x-1,y:obj.y},{x:obj.x,y:obj.y+1},{x:obj.x,y:obj.y-1}];g.enemies=g.enemies.map(e=>e.type!=='boss'&&area.find(a=>a.x===e.x&&a.y===e.y)?{...e,hp:e.hp-20}:e).filter(e=>e.hp>0);g.flash=[...cells.map(c=>({...c,col:'#f97316',fid:Math.random()}))];g.flashUntil=Date.now()+500;}return null;}
        return{...obj,hp:nhp};
      }).filter(Boolean);
      if(clank){g.stamina=Math.max(0,g.stamina-25);snd('drop');}
    }
    g.stamina=Math.max(0,g.stamina-10);
    g.flash=cells.map(c=>({...c,col:hits>0?'#22c55e':'#ef4444',fid:Math.random()}));g.flashUntil=Date.now()+350;
    if(hits>0)snd('hit');
    if(gmodeRef.current==='tutorial'&&!g.tutDone.attacked&&hits>0){
      g.tutDone.attacked=true;
      if(g.tutStep===5){setTimeout(()=>{const g2=gs.current;if(g2)g2.enemies=[];},300);g.tutStep=6;setTimeout(()=>setMsgRef.current?.(TUT[6].msg),900);}
    }
    forceRender();
  }
  const doAttack=useCallback(()=>doAttackInternal(false),[]);
  const doAttackRef=useRef(doAttack);
  useEffect(()=>{doAttackRef.current=doAttack;},[doAttack]);

  // ── Beacon complete ────────────────────────────────────────────
  const doBeaconComplete=useCallback(()=>{
    const g=gs.current;if(!g)return;
    snd('beacon');g.stamina=Math.min(100,g.stamina+50);g.divergence=0;g.highDTicks=0;g.dropped=false;g.beaconCount=0;g.beaconProgress=0;
    if(gmodeRef.current==='tutorial'&&!g.tutDone.beaconed){
      g.tutDone.beaconed=true;if(g.tutStep===6){g.tutStep=7;setTimeout(()=>setMsgRef.current?.(TUT[7].msg),600);}
    }
    forceRender();
  },[]);
  const doBeaconRef=useRef(doBeaconComplete);
  useEffect(()=>{doBeaconRef.current=doBeaconComplete;},[doBeaconComplete]);

  // ── Move ──────────────────────────────────────────────────────
  const doMoveDir=useCallback((sdx,sdy)=>{
    const g=gs.current;if(!g)return;
    let gdx=sdx,gdy=sdy;
    if(isRadarRef.current){const w=swipeToWorld(sdx,sdy,g.compassD);gdx=w.gdx;gdy=w.gdy;}
    if(g.dropped||(g.stamina<4&&g.spell?.fn!=='rush'))return;
    const nx=clamp(g.player.x+gdx,0,G-1),ny=clamp(g.player.y+gdy,0,G-1);
    if(nx===g.player.x&&ny===g.player.y)return;
    if(gmodeRef.current==='adventure'&&(nx<0||nx>=G||ny<0||ny>=G))return;
    if(g.enemies.some(e=>e.x===nx&&e.y===ny))return;
    if(gmodeRef.current==='adventure'){
      if(g.objects?.some(o=>OBJ_TYPES[o.type]?.blocksMove&&o.x===nx&&o.y===ny))return;
      if(g.enemies.some(e=>e.type==='boss'&&calcBossCells(e.x,e.y,e.size).some(bc=>bc.x===nx&&bc.y===ny)))return;
    }
    g.player={...g.player,x:nx,y:ny};
    if(g.spell?.fn!=='rush'){const cost=Math.max(0,g.pitch)*10;if(cost>0)g.stamina=Math.max(0,g.stamina-cost);}
    if(gmodeRef.current==='adventure'&&g.objects){
      const loot=g.objects.find(o=>OBJ_TYPES[o.type]?.isLoot&&o.x===nx&&o.y===ny);
      if(loot){
        g.objects=g.objects.filter(o=>o.id!==loot.id);
        const upg=OBJ_TYPES[loot.type]?.upg;
        if(upg==='hp'){g.player={...g.player,hp:Math.min(g.player.maxHp+20,g.player.hp+20),maxHp:g.player.maxHp+20};}
        else if(upg==='spell'){const avail=UNLOCKABLE_SPELLS.filter(s=>!(g.unlockedSpells||['.']).includes(s));if(avail.length>0){const ns=avail[Math.floor(Math.random()*avail.length)];g.unlockedSpells=[...(g.unlockedSpells||['.']),ns];setMsg('📜 Вивчено: '+(SPELL_MAP[ns]?.name||ns)+'!');}}
        else if(upg==='reach'){g.weaponMods={...g.weaponMods,reach:(g.weaponMods.reach||0)+1};}
        else if(upg==='weight'){g.weaponMods={...g.weaponMods,weight:Math.max(0.3,g.weaponMods.weight-0.15)};}

      }
    }
    if(gmodeRef.current==='tutorial'&&!g.tutDone.moved){
      g.tutDone.moved=true;if(g.tutStep===2){g.tutStep=3;setTimeout(()=>setMsgRef.current?.(TUT[3].msg),600);}

  },[]);

  // ── Rotate (keyboard/manual) ───────────────────────────────────
  const rotateW=useCallback((dir)=>{
    const g=gs.current;if(!g)return;
    const oldYaw=g.yawIdx;g.yawIdx=(g.yawIdx+dir+8)%8;
    if(gmodeRef.current==='tutorial'&&!g.tutDone.rotated&&g.tutStep===3&&g.yawIdx!==oldYaw){

  },[]);

  // ── Morse ─────────────────────────────────────────────────────
  const handleMorse=useCallback((sym)=>{
    const g=gs.current;if(!g)return;

    clearTimeout(morseTimer.current);
    morseTimer.current=setTimeout(()=>{
      const g2=gs.current;if(!g2)return;
      const seq=g2.morseSeq;g2.morseSeq='';
      const sp=SPELL_MAP[seq];

      forceRender();
    },1000);
  },[castSpell,setMsg]);

  // ── Sensors ───────────────────────────────────────────────────
  useEffect(()=>{
    if(sPhase!=='active')return;
    const handleCompassChange=(heading)=>{
      const g=gs.current;if(!g)return;
      const newYaw=Math.round(heading/45)%8;
      const oldYaw=g.yawIdx;
      g.compassD=heading;g.yawIdx=newYaw;
      // Tutorial rotate detection
      if(gmodeRef.current==='tutorial'&&!g.tutDone.rotated&&g.tutStep===3&&newYaw!==oldYaw){
        g.tutDone.rotated=true;g.tutStep=4;
        setTimeout(()=>setMsgRef.current?.(TUT[4].msg),600);
      }
    };
    const onO=(e)=>{
      const g=gs.current;if(!g)return;
      const beta=e.beta??0;g.pitch=betaToPitch(beta,settingsRef.current.pitchSens);
      if(e.webkitCompassHeading!=null&&!isNaN(e.webkitCompassHeading)){
        handleCompassChange(e.webkitCompassHeading);
      }
      // Tutorial pitch detection
      if(gmodeRef.current==='tutorial'&&!g.tutDone.pitched&&g.tutStep===4&&(g.pitch<-0.4||g.pitch>0.4)){
        g.tutDone.pitched=true;
        const[dx,dy]=DIR[g.yawIdx];
        g.enemies=[{id:EID++,type:'shadow',x:clamp(g.player.x+dx*2,0,G-1),y:clamp(g.player.y+dy*2,0,G-1),hp:3,maxHp:3,lastMove:0,dummy:true}];
        g.tutStep=5;setTimeout(()=>setMsgRef.current?.(TUT[5].msg),600);
      }

    };
    const onOA=(e)=>{
      if(e.alpha!=null&&!isNaN(e.alpha))handleCompassChange((360-e.alpha)%360);
      forceRender();
    };
    const onM=(e)=>{
      const g=gs.current;if(!g)return;
      const ag=e.accelerationIncludingGravity;if(!ag)return;
      const mag=Math.sqrt((ag.x??0)**2+(ag.y??0)**2+(ag.z??9.8)**2);
      const delta=Math.abs(mag-prevAccMag.current);const now=Date.now();
      if(delta>settingsRef.current.strikeThr&&now-lastStrikeT.current>500){lastStrikeT.current=now;doAttackRef.current?.();}
      prevAccMag.current=mag;
      const rr=e.rotationRate;const still=rr?Math.abs(rr.alpha??0)+Math.abs(rr.beta??0)+Math.abs(rr.gamma??0):999;
      if(g.pitch<-0.4&&still<18&&(gmodeRef.current==='tutorial'||gmodeRef.current==='survival')){
        g.beaconCount++;g.beaconProgress=clamp(g.beaconCount/120,0,1);
        if(g.beaconCount>=120)doBeaconRef.current?.();
      }else{g.beaconCount=Math.max(0,g.beaconCount-1);g.beaconProgress=clamp(g.beaconCount/120,0,1);}

    };
    window.addEventListener('deviceorientation',onO,true);
    window.addEventListener('deviceorientationabsolute',onOA,true);
    window.addEventListener('devicemotion',onM);
    return()=>{window.removeEventListener('deviceorientation',onO,true);window.removeEventListener('deviceorientationabsolute',onOA,true);window.removeEventListener('devicemotion',onM);};
  },[sPhase]);// eslint-disable-line

  // ── Keyboard ──────────────────────────────────────────────────
  useEffect(()=>{
    const held={};let bInt=null;
    const kd=e=>{
      if(held[e.key])return;held[e.key]=true;
      if(e.key==='ArrowUp'||e.key==='w')doMoveDir(0,-1);if(e.key==='ArrowDown'||e.key==='s')doMoveDir(0,1);
      if(e.key==='ArrowLeft'||e.key==='a')doMoveDir(-1,0);if(e.key==='ArrowRight'||e.key==='d')doMoveDir(1,0);
      if(e.key==='q')rotateW(-1);if(e.key==='e')rotateW(1);
      if(sPhase!=='active'){
        if(e.key==='z'){const g=gs.current;if(g){g.pitch=-1;forceRender();}}
        if(e.key==='c'){const g=gs.current;if(g){g.pitch=1;forceRender();}}
        if(e.key==='b'){bInt=setInterval(()=>{const g=gs.current;if(!g)return;g.beaconCount++;g.beaconProgress=clamp(g.beaconCount/16,0,1);if(g.beaconCount>=16){clearInterval(bInt);doBeaconRef.current?.();}forceRender();},TICK);}
      }
      if(e.key===' '){e.preventDefault();doAttackRef.current?.();}
      if(e.key==='.')handleMorse('.');if(e.key==='-')handleMorse('-');
    };
    const ku=e=>{
      delete held[e.key];
      if(sPhase!=='active'){
        if(e.key==='z'){const g=gs.current;if(g){g.pitch=0;forceRender();}}
        if(e.key==='c'){const g=gs.current;if(g){g.pitch=0;forceRender();}}

      }
    };

    return()=>{window.removeEventListener('keydown',kd);window.removeEventListener('keyup',ku);clearInterval(bInt);};
  },[sPhase,doMoveDir,rotateW,handleMorse]);

  // ── Touch (свайп скрізь, але НЕ на scroll-елементах) ─────────
  useEffect(()=>{
    const onS=e=>{
      // Не перехоплюємо якщо це scroll-контейнер (Morse bar)
      if(e.target.closest('.morse-scroll'))return;
      e.preventDefault();
      touchStart.current={x:e.touches[0].clientX,y:e.touches[0].clientY,t:Date.now()};
    };
    const onE=e=>{
      if(e.target.closest('.morse-scroll'))return;
      e.preventDefault();
      const{x,y,t}=touchStart.current;
      const dx=e.changedTouches[0].clientX-x,dy=e.changedTouches[0].clientY-y;
      const dist=Math.sqrt(dx*dx+dy*dy),dt=Date.now()-t;
      if(dist<25){handleMorse(dt<280?'.':'-');}
      else{clearTimeout(morseTimer.current);const g=gs.current;if(g){g.morseSeq='';forceRender();}if(Math.abs(dx)>Math.abs(dy))doMoveDir(Math.sign(dx),0);else doMoveDir(0,Math.sign(dy));}
    };
    const onM=e=>{if(!e.target.closest('.morse-scroll'))e.preventDefault();};
    document.addEventListener('touchstart',onS,{passive:false});
    document.addEventListener('touchend',onE,{passive:false});
    document.addEventListener('touchmove',onM,{passive:false});
    return()=>{document.removeEventListener('touchstart',onS);document.removeEventListener('touchend',onE);document.removeEventListener('touchmove',onM);};
  },[doMoveDir,handleMorse]);

  // ════════════════════════════════════════════════════════════════
  // ГЕЙМ ЛУП — мінімальні deps, все через refs
  // ════════════════════════════════════════════════════════════════
  useEffect(()=>{
    const id=setInterval(()=>{
      const g=gs.current;if(!g)return;
      const now=Date.now();
      const wpn=settingsRef.current.startWpn;
      const C=STRENGTH/WPN[wpn].w;

      // Flash expire
      if(g.flashUntil&&now>g.flashUntil){g.flash=[];g.flashUntil=0;}
      // ── ADVENTURE: edge timer + transition ──────────────────────
      if(gmodeRef.current==='adventure'&&!g.transitioning){
        const px=g.player.x,py=g.player.y;
        let eDir=null;if(py===0)eDir='N';else if(py===G-1)eDir='S';else if(px===0)eDir='W';else if(px===G-1)eDir='E';
        if(eDir){
          g.edgeTimer=(g.edgeTimer||0)+1;
          if(g.edgeTimer===25){g.peekDir=eDir;const nc=getNextCoord(g.roomCoord,eDir);g.peekInfo=g.roomMap[coordId(nc.x,nc.y)]||null;}
          if(g.edgeTimer>=50){
            g.transitioning=true;g.edgeTimer=0;
            const nc=getNextCoord(g.roomCoord,eDir);const nid=coordId(nc.x,nc.y);const rNum=calcRoomNum(nc.x,nc.y);
            const cid=coordId(g.roomCoord.x,g.roomCoord.y);
            if(g.roomMap[cid]){g.roomMap[cid].enemies=[...g.enemies];g.roomMap[cid].objects=[...g.objects];g.roomMap[cid].cleared=g.enemies.length===0;}
            const sx=eDir==='E'?0:eDir==='W'?G-1:clamp(g.player.x,0,G-1);
            const sy=eDir==='S'?0:eDir==='N'?G-1:clamp(g.player.y,0,G-1);
            g.player={...g.player,x:sx,y:sy};g.roomCoord=nc;g.roomNumber=rNum;g.peekDir=null;g.peekInfo=null;g._roomCleared=false;
            if(g.roomMap[nid]){const sv=g.roomMap[nid];g.enemies=sv.enemies||[];g.objects=sv.objects||[];g.isBossRoom=sv.isBoss||false;g.roomMap[nid].visited=true;setMsgRef.current?.((sv.cleared?'Кімната '+rNum+' (очищена)':'Кімната '+rNum+' · '+g.enemies.length+' ворогів'+(g.isBossRoom?' 👹':'')));}
            else{const ac=generateRoom(rNum,sx,sy,settingsRef.current.difficulty);g.enemies=ac.enemies;g.objects=ac.objects;g.isBossRoom=ac.isBoss;g.roomMap[nid]={enemies:ac.enemies,objects:ac.objects,isBoss:ac.isBoss,cleared:false,visited:true};setMsgRef.current?.(ac.isBoss?'👹 Кімната '+rNum+' — '+ac.enemies[0]?.name+'!':`Кімната ${rNum} · ${ac.enemies.length} ворогів`);}
            g.score+=15;g.flash=[];snd('wave');setTimeout(()=>{if(gs.current)gs.current.transitioning=false;},600);
          }
        }else{if(g.edgeTimer>0){g.edgeTimer=0;g.peekDir=null;g.peekInfo=null;}}
        if(g.enemies.length===0&&g._roomCleared!==g.roomNumber){
          g._roomCleared=g.roomNumber; // tied to room, not a timer
          setMsgRef.current?.('✓ Кімнату очищено! Стань на краю 4с → перехід');
        }
      }

      // Divergence
      let diff=g.yawIdx*45-g.vYaw;if(diff>180)diff-=360;if(diff<-180)diff+=360;
      g.vYaw+=diff*(C*0.09);g.divergence=Math.min(100,Math.abs(diff)*(1/C));

      // High divergence
      if(g.divergence>65){g.highDTicks++;if(g.highDTicks>20){g.highDTicks=0;g.stamina-=25;if(g.stamina<=0){g.dropped=true;g.droppedUntil=now+5000;g.fingers--;snd('drop');if(g.fingers<=0){snd('death');onDeadRef.current?.();return;}}}}
      else{g.highDTicks=0;}
      if(g.dropped&&now>g.droppedUntil)g.dropped=false;

      // Stamina
      const sdMult=DIFFICULTY[settingsRef.current.difficulty||'normal']?.staminaDrain||1;
      g.stamina=clamp(g.stamina+(1-(g.pitch+1)/2)*1.8-(g.divergence>65?1.2*sdMult:g.divergence>40?0.3*sdMult:0),0,100);

      // Spell expire
      if(g.spell&&now>g.spell.expires)g.spell=null;

      // Tutorial rotate detection (keyboard/fallback)
      if(gmodeRef.current==='tutorial'&&!g.tutDone.rotated&&g.tutStep===3){
        if(g.yawIdx!==g.prevYawIdx){
          g.tutDone.rotated=true;g.tutStep=4;
          setTimeout(()=>setMsgRef.current?.(TUT[4].msg),600);
        }
      }
      g.prevYawIdx=g.yawIdx;

      // ── ВОРОГИ ─────────────────────────────────────────────────
      if(!g.dropped&&g.enemies.length>0){
        let dmg=0,flash=false;
        g.enemies=g.enemies.map(e=>{
          if(e.dummy)return e;
          // ── BOSS: handle BEFORE ET lookup (ET has no 'boss' key) ──
          if(e.type==='boss'){
            if(e.frozen&&now<e.frozen)return e;
            if(now-(e.lastMove||0)<(e.ms||700))return e;
            const bcs=calcBossCells(e.x,e.y,e.size||1);
            const adjToPlayer=bcs.some(bc=>Math.abs(bc.x-g.player.x)+Math.abs(bc.y-g.player.y)<=1);
            if(adjToPlayer){dmg+=e.dmg||20;flash=true;return{...e,lastMove:now};}
            const bdx=g.player.x-e.x,bdy=g.player.y-e.y;
            const bDirs=[[Math.sign(bdx),0],[0,Math.sign(bdy)],[Math.sign(bdx),Math.sign(bdy)]].filter(([mx,my])=>mx||my);
            const bm=bDirs.map(([mx,my])=>{
              const nbx=e.x+mx,nby=e.y+my;
              if(nbx<0||nby<0||nbx+(e.size||1)>G||nby+(e.size||1)>G)return null;
              const nc=calcBossCells(nbx,nby,e.size||1);
              if(nc.some(c=>c.x===g.player.x&&c.y===g.player.y))return null;
              if(g.objects?.some(o=>OBJ_TYPES[o.type]?.blocksMove&&nc.some(c=>c.x===o.x&&c.y===o.y)))return null;
              return{x:nbx,y:nby,d:Math.abs(g.player.x-nbx)+Math.abs(g.player.y-nby)};
            }).filter(Boolean).sort((a,b)=>a.d-b.d)[0];

          if(e.frozen&&now<e.frozen)return e;
          const et=ET[e.type];
          if(!et)return e; // safety: unknown type
          const ms=(e.chaosUntil&&now<e.chaosUntil)?et.ms*2:et.ms;
          if(now-(e.lastMove||0)<ms)return e;
          const dx=g.player.x-e.x,dy=g.player.y-e.y;
          const dist=Math.abs(dx)+Math.abs(dy);
          if(dist<=1){
            const shield=g.spell?.fn==='shield',armor=g.spell?.fn==='armor',stealth=g.spell?.fn==='stealth';
            if(!stealth){const dmgM=DIFFICULTY[settingsRef.current.difficulty||'normal']?.enemyDmg||1;const d=armor?Math.round(et.dmg*dmgM*.4):Math.round(et.dmg*dmgM);dmg+=d;flash=true;if(shield)g.spell=null;}
            return{...e,lastMove:now};
          }
          const dirs=e.type==='ghost'?DIR:[[Math.sign(dx),0],[0,Math.sign(dy)]];
          const best=dirs.map(([mx,my])=>{
            const nx2=e.x+mx,ny2=e.y+my;
            if(nx2<0||nx2>=G||ny2<0||ny2>=G)return null;
            if(nx2===g.player.x&&ny2===g.player.y)return null;
            if(g.enemies.some(o=>o.id!==e.id&&o.x===nx2&&o.y===ny2))return null;
            if(g.objects?.some(o=>OBJ_TYPES[o.type]?.blocksMove&&o.x===nx2&&o.y===ny2))return null;
            return{x:nx2,y:ny2,d:Math.abs(g.player.x-nx2)+Math.abs(g.player.y-ny2)};
          }).filter(Boolean).sort((a,b)=>a.d-b.d)[0];
          return best?{...e,x:best.x,y:best.y,lastMove:now}:{...e,lastMove:now};
        }).filter(Boolean);

        if(dmg>0){
          g.player={...g.player,hp:Math.max(0,g.player.hp-dmg)};
          if(flash){snd('hurt');g.flash=[{x:g.player.x,y:g.player.y,col:'#ef4444',fid:Math.random()}];g.flashUntil=now+300;}
          if(g.player.hp<=0){snd('death');onDeadRef.current?.();return;}
        }
      }

      // ── ХВИЛЯ ЗАВЕРШЕНА ────────────────────────────────────────
      if(gmodeRef.current==='survival'&&g.wave>0&&g.enemies.length===0&&!g._waveTimer){
        const next=g.wave+1;
        g.wave=next;g.waveMsg=`Хвиля ${next}`;
        g._waveTimer=setTimeout(()=>{
          if(gs.current)gs.current._waveTimer=null;

        },2500);
      }

      forceRender();
    },TICK);
    return()=>clearInterval(id);
  },[]);// ← ПОРОЖНІ DEPS! Все через refs — луп ніколи не перезапускається.

  // ── Render ────────────────────────────────────────────────────
  const g=gs.current;
  if(!g)return null;
  const wCells=getWCells(g.player.x,g.player.y,g.yawIdx,settings.startWpn,g.weaponMods?.reach||0);
  const cellSz=isPanorama?Math.floor(window.innerWidth/G):Math.min(27,Math.floor((Math.min(window.innerWidth,480)-20)/G));
  const pc=pColor(g.pitch);const dc=g.divergence>70?'#ef4444':g.divergence>40?'#f59e0b':'#22c55e';
  const getPos=(gx,gy)=>isRadar?toScreen(gx,gy,g.player.x,g.player.y,g.compassD):{sx:gx,sy:gy};

  return(
    <div style={{background:'#010d1f',flex:1,display:'flex',flexDirection:'column',alignItems:'center',overflow:'hidden',fontFamily:"'Courier New',monospace"}}>

      {/* HUD */}
      <div style={{width:'100%',maxWidth:'480px',padding:'5px 8px 1px',display:'flex',gap:'5px',alignItems:'center'}}>
        <Bar v={g.player.hp} max={g.player.maxHp} col={g.player.hp>50?'#22c55e':g.player.hp>25?'#f59e0b':'#ef4444'} lbl="HP"/>
        <Bar v={g.stamina} max={100} col='#60a5fa' lbl="STA"/>
        <div style={{display:'flex',gap:'2px'}}>{Array.from({length:5},(_,i)=><div key={i} style={{width:'4px',height:'11px',borderRadius:'2px',background:i<g.fingers?(g.dropped?'#f59e0b':'#22c55e'):'#1e293b'}}/>)}</div>
        {sPhase==='active'&&<div style={{fontSize:'7px',color:'#22c55e'}}>◉</div>}
        <div style={{fontSize:'9px',color:g.isBossRoom?'#f97316':'#60a5fa',minWidth:'30px',textAlign:'right'}}>{gmode==='adventure'?`R${g.roomNumber||1}${g.isBossRoom?'👹':''}`:gmode==='survival'?`W${g.wave}`:'TUT'}</div>
        {(gmode==='survival'||gmode==='adventure')&&<div style={{fontSize:'9px',color:'#f59e0b',minWidth:'20px',textAlign:'right'}}>{g.score}</div>}
      </div>

      {/* DIV + spell */}
      <div style={{width:'100%',maxWidth:'480px',padding:'0 8px 1px',display:'flex',alignItems:'center',gap:'4px'}}>
        <div style={{fontSize:'7px',color:'#1e3a5f',width:'18px'}}>DIV</div>
        <div style={{flex:1,height:'3px',background:'#020c1a',borderRadius:'2px',overflow:'hidden'}}><div style={{height:'100%',width:`${g.divergence}%`,background:dc,transition:'width .05s'}}/></div>
        {g.spell&&<div style={{fontSize:'8px',color:g.spell.col,animation:'pulse .5s infinite',marginLeft:'4px'}}>{g.spell.name}</div>}
        {g.dropped&&<div style={{fontSize:'8px',color:'#f59e0b',animation:'pulse .5s infinite'}}>⚠DROP</div>}
      </div>

      {/* Morse input display */}
      {g.morseSeq&&<div style={{fontSize:'12px',letterSpacing:'.2em',padding:'0 8px 1px'}}>
        {g.morseSeq.split('').map((s,i)=><span key={i} style={{color:s==='.'?'#60a5fa':'#f59e0b'}}>{s}</span>)}
      </div>}

      {/* Sensor readout */}
      {sPhase==='active'&&<div style={{width:'100%',maxWidth:'480px',padding:'0 8px 1px',display:'flex',gap:'8px',fontSize:'7px',color:'#1e3a5f'}}>
        <span>β<span style={{color:pc}}>{Math.round(g.pitch*settingsRef.current.pitchSens+40)}°</span></span>
        <span>⚔<span style={{color:'#60a5fa'}}>{DNAM[g.yawIdx]}</span></span>
        {isRadar&&<span>↻<span style={{color:'#a78bfa'}}>{g.compassD.toFixed(0)}°</span></span>}
        <span style={{color:pc}}>{g.pitch<-0.3?'REST':g.pitch>0.3?'CHARGE':'HOLD'}</span>
      </div>}

      {g.waveMsg&&<div style={{fontSize:'16px',color:'#f59e0b',fontWeight:'bold',padding:'1px',letterSpacing:'.1em'}}>{g.waveMsg}</div>}
      {gmode==='adventure'&&g.enemies?.some(e=>e.type==='boss')&&(()=>{const boss=g.enemies.find(e=>e.type==='boss');return(<div style={{width:'100%',maxWidth:'480px',padding:'0 8px 2px',display:'flex',alignItems:'center',gap:'5px'}}>
        <div style={{fontSize:'8px',color:boss.col,minWidth:'60px'}}>👹{boss.name}</div>
        <div style={{flex:1,height:'6px',background:'#020c1a',borderRadius:'3px',overflow:'hidden',border:`1px solid ${boss.col}44`}}><div style={{height:'100%',width:`${(boss.hp/boss.maxHp)*100}%`,background:boss.col,transition:'width .1s'}}/></div>
        <div style={{fontSize:'8px',color:boss.col}}>{boss.hp}/{boss.maxHp}</div>
      </div>);})()}
      {gmode==='adventure'&&(g.edgeTimer||0)>5&&<div style={{width:'100%',maxWidth:'480px',padding:'1px 8px',display:'flex',alignItems:'center',gap:'5px'}}>
        <div style={{fontSize:'7px',color:'#f97316',minWidth:'40px'}}>{g.peekDir?`→${g.peekDir}`:'🚪'}</div>
        <div style={{flex:1,height:'3px',background:'#020c1a',borderRadius:'2px',overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,(g.edgeTimer||0)/50*100)}%`,background:'#f97316',transition:'width .08s'}}/></div>
        <div style={{fontSize:'7px',color:'#f97316'}}>{Math.round((g.edgeTimer||0)/50*100)}%</div>
      </div>}
      {gmode==='adventure'&&g.peekDir&&(()=>{
        const nc=getNextCoord(g.roomCoord,g.peekDir);const rNum=calcRoomNum(nc.x,nc.y);const pr=g.peekInfo;
        const dirSym={N:'↑ ПІВНІЧ',S:'↓ ПІВДЕНЬ',E:'→ СХІД',W:'← ЗАХІД'}[g.peekDir]||g.peekDir;
        return(<div style={{position:'fixed',bottom:'8%',left:'50%',transform:'translateX(-50%)',zIndex:20,background:'rgba(1,13,31,0.96)',border:`1px solid ${pr?.isBoss?'#f97316':'#1e4a7f'}`,borderRadius:'9px',padding:'10px 14px',minWidth:'210px',fontFamily:"'Courier New',monospace",animation:'fadeIn .3s ease'}}>
          <div style={{fontSize:'8px',color:'#1e3a5f',letterSpacing:'.12em',marginBottom:'3px'}}>{dirSym}</div>
          <div style={{fontSize:'12px',fontWeight:'bold',color:pr?.isBoss?'#f97316':'#60a5fa',marginBottom:'4px'}}>{pr?(pr.isBoss?`👹 КІМНАТА ${rNum} — БОС`:`Кімната ${rNum}`):`? Кімната ${rNum}`}</div>
          {pr&&<div style={{fontSize:'9px',color:'#94a3b8'}}>{pr.cleared?<span style={{color:'#22c55e'}}>✓ очищена</span>:<span>⚔ {pr.enemies?.length||0} ворогів</span>}
            {pr.objects?.filter(o=>OBJ_TYPES[o.type]?.isLoot).length>0&&<span style={{color:'#fbbf24'}}> 💎 {pr.objects.filter(o=>OBJ_TYPES[o.type]?.isLoot).map(o=>OBJ_TYPES[o.type]?.sym).join('')}</span>}
          </div>}
          {!pr&&<div style={{fontSize:'9px',color:'#334155'}}>невідома кімната</div>}
          <div style={{fontSize:'7px',color:'#1e3a5f',marginTop:'4px',textAlign:'center'}}>залишайся → авто-перехід</div>
        </div>);
      })()}
      {gmode==='adventure'&&((g.weaponMods?.reach||0)>0||g.weaponMods?.sharpness>1||g.weaponMods?.weight<1||(g.unlockedSpells?.length||0)>1)&&(
        <div style={{width:'100%',maxWidth:'480px',padding:'0 8px 1px',display:'flex',gap:'5px',fontSize:'8px'}}>
          {(g.weaponMods?.reach||0)>0&&<span style={{color:'#f97316'}}>🔭+{g.weaponMods.reach}кл</span>}
          {g.weaponMods?.weight<1&&<span style={{color:'#22c55e'}}>🌬+{Math.round((1-g.weaponMods.weight)*100)}%</span>}
          {g.weaponMods?.sharpness>1&&<span style={{color:'#f59e0b'}}>⚡+{Math.round((g.weaponMods.sharpness-1)*100)}%</span>}
          <span style={{color:'#e879f9',marginLeft:'auto'}}>✨{g.unlockedSpells?.length||1}/16</span>
        </div>
      )}

      {/* GRID */}
      <div style={isPanorama?{
          position:'fixed',inset:0,zIndex:1,background:'#010d1f',
          display:'grid',
          gridTemplateColumns:`repeat(${G},1fr)`,
          gridTemplateRows:`repeat(${G},1fr)`,
          transform:'perspective(320px) rotateX(42deg)',
          transformOrigin:'50% 46%',
        }:{padding:'3px',background:'#010d1f',border:'2px solid #1e4a7f',borderRadius:'6px',margin:'2px 0',boxShadow:'0 0 8px #1e3a5f44'}}>
        <div style={{display:isPanorama?'contents':'grid',gridTemplateColumns:isPanorama?undefined:`repeat(${G},${cellSz}px)`,gap:'1px'}}>
          {Array.from({length:G*G},(_,idx)=>{
            const sx=idx%G,sy=Math.floor(idx/G);
            const isP=isRadar?(sx===CX&&sy===CY):(sx===g.player.x&&sy===g.player.y);
            const en=g.enemies.find(e=>{if(e.type==='boss')return false;const{sx:ex,sy:ey}=getPos(e.x,e.y);return ex===sx&&ey===sy;});
            const wc=wCells.find(c=>{const{sx:wx,sy:wy}=getPos(c.x,c.y);return wx===sx&&wy===sy;});
            const fl=g.flash.find(c=>{const pos=isRadar?toScreen(c.x,c.y,g.player.x,g.player.y,g.compassD):{sx:c.x,sy:c.y};return pos.sx===sx&&pos.sy===sy;});
            // In radar mode: find world-space coords for this screen cell
const _wc=isRadar?fromScreen(sx,sy,g.player.x,g.player.y,g.compassD):{gx:sx,gy:sy};
// Void = outside the world (only happens in radar when player is off-center)
const isVoid=isRadar&&(_wc.gx<0||_wc.gx>=G||_wc.gy<0||_wc.gy>=G);
const isEdge=!isVoid&&(_wc.gx===0||_wc.gx===G-1||_wc.gy===0||_wc.gy===G-1);
            const cellObj=g.objects?.find(o=>{const{sx:ox,sy:oy}=getPos(o.x,o.y);return ox===sx&&oy===sy;});
            const cellBoss=g.enemies?.find(e=>e.type==='boss'&&calcBossCells(e.x,e.y,e.size).some(bc=>{const{sx:bsx,sy:bsy}=getPos(bc.x,bc.y);return bsx===sx&&bsy===sy;}));
            let bg=isVoid?'#000000':isEdge?'#040e1a':'#020c1a';
            let bdr=isVoid?'none':isEdge?'2px solid #2a5a9f':'1px solid #091c30';
            if(fl)bg=fl.col+'55';
            else if(isP){bg='#14532d';bdr='1px solid #22c55e';}
            else if(en&&ET[en.type]){bg=ET[en.type].col+'22';bdr=`1px solid ${ET[en.type].col}`;}
            else if(cellBoss){bg=cellBoss.col+'22';bdr=`2px solid ${cellBoss.col}`;}
            else if(cellObj&&!OBJ_TYPES[cellObj.type]?.isLoot){const ot2=OBJ_TYPES[cellObj.type];bg=ot2.destructible?'#92400e33':'#37415144';bdr=`1px solid ${ot2.col}`;}
            else if(wc){bg=wc.extra?'#f9731344':wc.main?'#1e3a8a44':'#1e3a8a18';bdr=`1px solid ${wc.extra?'#f97316':wc.main?'#3b82f6':'#1e3a5f'}`;}
            return(
              <div key={idx} style={{width:isPanorama?'100%':`${cellSz}px`,height:isPanorama?'100%':`${cellSz}px`,background:bg,border:bdr,borderRadius:'1px',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',transition:'background .05s'}}>
                {!isVoid&&!isP&&!en&&cellObj&&(()=>{const ot=OBJ_TYPES[cellObj.type];return <span style={{fontSize:`${cellSz*.55}px`,color:ot.col,opacity:ot.destructible?(0.4+((cellObj.hp||1)/3)*0.6):1}}>{ot.sym}</span>;})()}
                {!isVoid&&!isP&&!en&&!cellObj&&cellBoss&&(()=>{const isCore=getPos(cellBoss.x,cellBoss.y).sx===sx&&getPos(cellBoss.x,cellBoss.y).sy===sy;return <span style={{fontSize:`${cellSz*.6}px`,color:cellBoss.col,fontWeight:'bold'}}>{isCore?cellBoss.sym:'·'}</span>;})()}
                {isP?(<>
                  <div style={{width:`${cellSz*.44}px`,height:`${cellSz*.44}px`,borderRadius:'50%',
                    background:g.dropped?'#f59e0b':g.spell?.fn==='shield'?'#3b82f6':'#22c55e',
                    boxShadow:`0 0 5px ${g.dropped?'#f59e0b':g.spell?.fn==='shield'?'#3b82f6':'#22c55e'}`}}/>
                  <div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',fontSize:`${cellSz*.52}px`,color:'#22c55e',lineHeight:1,pointerEvents:'none'}}>{isRadar?'↑':DSYM[g.yawIdx]}</div>
                </>):en&&ET[en.type]?(<span style={{color:ET[en.type].col+(en.frozen&&Date.now()<en.frozen?'77':'ff'),fontSize:`${cellSz*.48}px`}}>{ET[en.type].sym}</span>):wc?.extra?<span style={{color:'#f9731688',fontSize:`${cellSz*.35}px`}}>+</span>:null}
              </div>
            );
          })}
        </div>
      </div>

      {/* Beacon */}
      {g.beaconProgress>0&&<div style={{width:'100%',maxWidth:'480px',padding:'2px 8px',display:'flex',alignItems:'center',gap:'5px'}}>
        <div style={{fontSize:'7px',color:'#22c55e'}}>⬇МАЯК</div>
        <div style={{flex:1,height:'3px',background:'#020c1a',borderRadius:'2px',overflow:'hidden'}}><div style={{height:'100%',width:`${g.beaconProgress*100}%`,background:'#22c55e',transition:'width .05s'}}/></div>
      </div>}

      {/* Companion */}
      {g.msg&&<div key={g.msgKey} style={{margin:'2px 8px',padding:'6px 9px',background:'#060f1e',border:'1px solid #1e3a5f',borderRadius:'6px',fontSize:'10px',color:'#94a3b8',fontStyle:'italic',maxWidth:'440px',width:'100%',lineHeight:1.6,animation:'fadeIn .3s ease'}}>{g.msg}</div>}

      {/* MORSE BAR — завжди видимий знизу */}
      <MorseBar currentSeq={g.morseSeq} unlocked={gmode==='adventure'?g.unlockedSpells:null}/>

      {/* Status */}
      <div style={{padding:'1px 8px 4px',fontSize:'7px',color:'#1e3a5f',display:'flex',gap:'6px',flexWrap:'wrap'}}>
        <span style={{color:dc}}>D={Math.round(g.divergence)}%</span>
        <span>HP<span style={{color:g.player.hp>50?'#22c55e':'#ef4444'}}>{g.player.hp}</span></span>
        {isRadar&&<span style={{color:'#a78bfa'}}>RADAR</span>}
        <span>свайп=рух · тап=· · тримай=−</span>
      </div>
    </div>
  );
}
function Bar({v,max,col,lbl}){return(<div style={{flex:1}}><div style={{fontSize:'7px',color:'#1e3a5f',marginBottom:'2px'}}>{lbl}</div><div style={{height:'5px',background:'#020c1a',borderRadius:'3px',overflow:'hidden'}}><div style={{height:'100%',width:`${(v/max)*100}%`,background:col,transition:'width .2s'}}/></div></div>);}

// ── WARNING ───────────────────────────────────────────────────────
function Warning({onOk,setSPhase}){
  const[ok,setOk]=useState(false);
  const[asking,setAsking]=useState(false);

  const handleContinue=async()=>{
    if(!ok||asking)return;
    setAsking(true);
    try{
      if(typeof DeviceOrientationEvent?.requestPermission==='function')
        if(await DeviceOrientationEvent.requestPermission()!=='granted')throw 0;
      if(typeof DeviceMotionEvent?.requestPermission==='function')
        if(await DeviceMotionEvent.requestPermission()!=='granted')throw 0;
      setSPhase('active');
    }catch{setSPhase('denied');}
    setAsking(false);
    onOk();
  };

  return(<div style={{background:'#010d1f',flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontFamily:"'Courier New',monospace",padding:'20px',gap:'12px'}}>
    <div style={{fontSize:'36px'}}>⚠️</div>
    <div style={{color:'#f59e0b',fontSize:'15px',fontWeight:'bold'}}>УВАГА!</div>
    <div style={{color:'#4a6a9f',fontSize:'10px',textAlign:'center',lineHeight:2,maxWidth:'300px',background:'#060f1e',border:'1px solid #78350f',borderRadius:'8px',padding:'14px'}}>
      Гра вимагає фізичних рухів смартфоном.<br/>
      <span style={{color:'#ef4444',fontWeight:'bold'}}>НЕ розбий телефон!</span><br/>
      Грай в безпечному відкритому місці.<br/>
      Переконайся що навколо нікого немає.<br/>
      <span style={{color:'#334155'}}>Рекомендується ремінець на зап'ясті.</span>
    </div>
    {asking&&<div style={{color:'#f59e0b',fontSize:'11px',animation:'pulse .5s infinite'}}>⏳ Підключення датчиків...</div>}
    <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer',color:'#4a6a9f',fontSize:'11px'}}>
      <input type="checkbox" checked={ok} onChange={e=>setOk(e.target.checked)} style={{width:'18px',height:'18px',cursor:'pointer'}}/>
      Я розумію і граю обережно
    </label>
    <B2 onClick={ok&&!asking?handleContinue:undefined} col={ok?'#22c55e':'#1e3a5f'} style={{maxWidth:'260px',opacity:ok&&!asking?1:.5}}>
      {asking?'⏳ Запит дозволів...':ok?'▷ ПРОДОВЖИТИ':'(підтвердь спочатку)'}
    </B2>
  </div>);
}

// ── APP ───────────────────────────────────────────────────────────
function App(){
  const[screen,setScreen]=useState('warning');
  const[gmode, setGmode] =useState('tutorial');
  const[sPhase,setSPhase]=useState('idle');
  const[S,setS]=useState({worldMode:'classic',strikeThr:7,pitchSens:40,startWpn:'sword',voice:true,difficulty:'normal'});
  // onDead — стабільний через useCallback щоб не перезапускати гейм-луп
  const onDead=useCallback(()=>setScreen('dead'),[]);
  return(
    <>
      {screen==='warning'&&<Warning onOk={()=>setScreen('menu')} setSPhase={setSPhase}/>}
      {screen==='settings'&&<Settings s={S} setS={setS} sPhase={sPhase} setSPhase={setSPhase} onBack={()=>setScreen('menu')}/>}
      {screen==='game'&&<Game key={`${gmode}-${Math.random()}`} gmode={gmode} settings={S} sPhase={sPhase} onDead={onDead}/>}
      {screen==='dead'&&(
        <div style={{background:'#010d1f',flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontFamily:"'Courier New',monospace",gap:'12px',padding:'20px'}}>
          <div style={{color:'#ef4444',fontSize:'34px',fontWeight:'bold',animation:'shake .4s'}}>ВПАВ</div>
          <div style={{display:'flex',flexDirection:'column',gap:'8px',width:'100%',maxWidth:'240px'}}>
            <B2 onClick={()=>{setGmode('survival');setScreen('game');}}>↻ ЩЕ РАЗ</B2>
            <B2 onClick={()=>setScreen('menu')} col='#4a6a9f'>← МЕНЮ</B2>
          </div>
        </div>
      )}
      {screen==='menu'&&(
        <div style={{background:'#010d1f',flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontFamily:"'Courier New',monospace",padding:'18px',gap:'10px'}}>
          <div style={{color:'#1e3a5f',fontSize:'9px',letterSpacing:'.25em'}}>МИР 13×13</div>
          <div style={{color:'#3a6a9f',fontSize:'24px',fontWeight:'bold'}}>СЛІПИЙ БІЙ</div>
          <div style={{fontSize:'8px',color:'#334155',textAlign:'center',lineHeight:1.9}}>свайп=рух · тап=· · тримай=− · мах=удар<br/><span style={{color:'#1e3a5f'}}>Морзе-заклинання — дивись знизу під сіткою</span></div>
          <div style={{padding:'7px 12px',background:'#060f1e',border:`1px solid ${sPhase==='active'?'#16a34a':'#1e3a5f'}`,borderRadius:'6px',fontSize:'9px',textAlign:'center',width:'100%',maxWidth:'270px'}}>
            {sPhase==='active'?<span style={{color:'#22c55e'}}>◉ Датчики · {WPN[S.startWpn].label} · {S.worldMode==='radar'?'RADAR':S.worldMode==='panorama'?'ПАНОРАМА':'КЛАСИКА'}</span>:<span style={{color:'#334155'}}>Датчики вимкнені → ⚙</span>}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'7px',width:'100%',maxWidth:'270px'}}>
            <B2 onClick={()=>{setGmode('tutorial');setScreen('game');}}>▷ ТУТОРІАЛ</B2>
            <B2 onClick={()=>{setGmode('survival');setScreen('game');}} col='#60a5fa'>◈ ВИЖИВАННЯ</B2>
            <B2 onClick={()=>{setGmode('adventure');setScreen('game');}} col='#f97316'>🗺 ПРИГОДА</B2>
            <B2 onClick={()=>setScreen('settings')} col='#a78bfa'>⚙ НАЛАШТУВАННЯ</B2>
          </div>
        </div>
      )}
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
