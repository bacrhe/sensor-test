function speak(text,on){
  if(!on||!text||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='uk-UA';u.rate=0.85;u.pitch=0.7;u.volume=0.45; // вдвічі тихіше
  const v=window.speechSynthesis.getVoices();
  const uk=v.find(x=>x.lang.startsWith('uk'))||v.find(x=>x.lang.startsWith('ru'));
  if(uk)u.voice=uk;
  window.speechSynthesis.speak(u);
}

let AC=null;
function snd(t){
  try{
    if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    const C=AC,ts=C.currentTime,o=C.createOscillator(),g=C.createGain();
    o.connect(g);g.connect(C.destination);
    if(t==='swing'){o.type='sawtooth';o.frequency.setValueAtTime(200,ts);o.frequency.exponentialRampToValueAtTime(80,ts+.12);g.gain.setValueAtTime(.2,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.12);o.start(ts);o.stop(ts+.12);}
    else if(t==='hit'){const b=C.createBuffer(1,C.sampleRate*.04,C.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/400);const s=C.createBufferSource();s.buffer=b;const gg=C.createGain();gg.gain.value=.5;s.connect(gg);gg.connect(C.destination);s.start(ts);}
    else if(t==='hurt'){o.type='square';o.frequency.setValueAtTime(100,ts);o.frequency.exponentialRampToValueAtTime(50,ts+.25);g.gain.setValueAtTime(.25,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.25);o.start(ts);o.stop(ts+.25);}
    else if(t==='drop'){o.type='triangle';o.frequency.setValueAtTime(280,ts);o.frequency.exponentialRampToValueAtTime(70,ts+.3);g.gain.setValueAtTime(.18,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.3);o.start(ts);o.stop(ts+.3);}
    else if(t==='beacon'){[440,550,660,880].forEach((f,i)=>{const oo=C.createOscillator(),gg=C.createGain();oo.type='sine';oo.frequency.value=f;oo.connect(gg);gg.connect(C.destination);const st=ts+i*.07;gg.gain.setValueAtTime(0,st);gg.gain.linearRampToValueAtTime(.15,st+.04);gg.gain.exponentialRampToValueAtTime(.001,st+.35);oo.start(st);oo.stop(st+.35);});}
    else if(t==='dot'){o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.15,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.07);o.start(ts);o.stop(ts+.07);}
    else if(t==='dash'){o.type='sine';o.frequency.value=660;g.gain.setValueAtTime(.15,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.18);o.start(ts);o.stop(ts+.18);}
    else if(t==='spell'){[330,440,550,660,550].forEach((f,i)=>{const oo=C.createOscillator(),gg=C.createGain();oo.type='sine';oo.frequency.value=f;oo.connect(gg);gg.connect(C.destination);const st=ts+i*.06;gg.gain.setValueAtTime(.18,st);gg.gain.exponentialRampToValueAtTime(.001,st+.12);oo.start(st);oo.stop(st+.12);});}
    else if(t==='wave'){o.type='triangle';o.frequency.setValueAtTime(110,ts);o.frequency.exponentialRampToValueAtTime(220,ts+.45);g.gain.setValueAtTime(.2,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.45);o.start(ts);o.stop(ts+.45);}
    else if(t==='death'){o.type='sine';o.frequency.setValueAtTime(440,ts);o.frequency.exponentialRampToValueAtTime(110,ts+.9);g.gain.setValueAtTime(.3,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.9);o.start(ts);o.stop(ts+.9);}
  }catch(e){}
}

// ── WEAPON SWING SOUNDS (per-weapon character) ──────────────────────────
function weaponSnd(wpn){
  try{
    if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    const C=AC,ts=C.currentTime;
    const profiles={
      sword:{f1:300,f2:120,t:0.12,type:'sawtooth'},
      dagger:{f1:500,f2:200,t:0.07,type:'sawtooth'},
      axe:{f1:150,f2:60,t:0.18,type:'square'},
      spear:{f1:400,f2:180,t:0.1,type:'triangle'},
      greatsword:{f1:180,f2:70,t:0.2,type:'sawtooth'},
      flail:{f1:250,f2:100,t:0.15,type:'square'},
      bow:{f1:600,f2:300,t:0.08,type:'sine'},
    };
    const p=profiles[wpn]||profiles.sword;
    const o=C.createOscillator(),g=C.createGain();o.connect(g);g.connect(C.destination);
    o.type=p.type;o.frequency.setValueAtTime(p.f1,ts);o.frequency.exponentialRampToValueAtTime(p.f2,ts+p.t);
    g.gain.setValueAtTime(.18,ts);g.gain.exponentialRampToValueAtTime(.001,ts+p.t);
    o.start(ts);o.stop(ts+p.t);
  }catch(e){}
}

// ── BACKGROUND MUSIC (ambient loop) ─────────────────────────────────────
let _bgmNodes=null;
function startBGM(on){
  if(!on||_bgmNodes)return;
  try{
    if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    const C=AC;
    const master=C.createGain();master.gain.value=0.08;master.connect(C.destination);
    // Slow ambient drone with two detuned oscillators + pulsing
    const o1=C.createOscillator(),o2=C.createOscillator(),lfo=C.createOscillator();
    const lfoGain=C.createGain();
    o1.type='sine';o1.frequency.value=55;
    o2.type='sine';o2.frequency.value=82.4;
    lfo.type='sine';lfo.frequency.value=0.12;lfoGain.gain.value=0.04;
    lfo.connect(lfoGain);lfoGain.connect(master.gain);
    o1.connect(master);o2.connect(master);
    o1.start();o2.start();lfo.start();
    _bgmNodes={o1,o2,lfo,master};
  }catch(e){}
}
function stopBGM(){
  if(!_bgmNodes)return;
  try{_bgmNodes.o1.stop();_bgmNodes.o2.stop();_bgmNodes.lfo.stop();_bgmNodes.master.disconnect();}catch(e){}
  _bgmNodes=null;
}

function getNextCoord(coord,dir){const{x,y}=coord;if(dir==='N')return{x,y:y-1};if(dir==='S')return{x,y:y+1};if(dir==='E')return{x:x+1,y};if(dir==='W')return{x:x-1,y};return coord;}
function calcBossCells(bx,by,size){const c=[];for(let dy=0;dy<size;dy++)for(let dx=0;dx<size;dx++)c.push({x:bx+dx,y:by+dy});return c;}

// ── МОДУЛЬ ГЕНЕРАЦІЇ СТИЛІВ КІМНАТ (13×13 метасітка) ─────────────────────
// Градієнтне зміщення від "Чистої Свідомості" (центр 6,6) до екстремальних
// станів. Weight=(|d|/6)² — квадратичне віддалення.
// Вертикаль Y: dY>0=Сходження(Світло), dY<0=Спуск(Ерозія)
// Горизонталь X: dX>0=Відлуння(Порядок), dX<0=Шум(Хаос)
const META_CENTER=6; // центр метасітки 13×13 (індекси 0..12)
function roomStyle(rx,ry){
  const dX=rx-META_CENTER, dY=ry-META_CENTER;
  const wX=Math.pow(Math.abs(dX)/6,2); // 0 в центрі → 1 на краю
  const wY=Math.pow(Math.abs(dY)/6,2);
  const weight=Math.min(1,(wX+wY)/2);   // загальна "спотвореність"
  // Осі (-1..+1)
  const axisV=dY/6; // +сходження / -спуск
  const axisH=dX/6; // +відлуння(порядок) / -шум(хаос)
  // Архетип за домінантною віссю
  const absV=Math.abs(axisV),absH=Math.abs(axisH);
  let archetype='center';
  if(absV<0.18&&absH<0.18)archetype='center';
  else if(absV>=absH)archetype=axisV>0?'ascension':'descent';
  else archetype=axisH>0?'echo':'noise';
  // Діагональні гібриди (де осі співмірні)
  const isDiagonal=Math.abs(absV-absH)<0.25&&absV>0.18&&absH>0.18;
  if(isDiagonal){
    if(axisV>0&&axisH>0)archetype='ascension_echo';   // Світло+Порядок: Храм
    else if(axisV>0&&axisH<0)archetype='ascension_noise'; // Світло+Хаос: Спалах
    else if(axisV<0&&axisH>0)archetype='descent_echo';   // Ерозія+Порядок: Механізм
    else archetype='descent_noise';                       // Ерозія+Хаос: Безодня
  }
  // Палітри за архетипом
  const PAL={
    center:        {bg:'#020c1a',edge:'#2a5a9f',accent:'#60a5fa',name:'Чиста Свідомість',sym:'◌'},
    ascension:     {bg:'#0a1410',edge:'#4ade80',accent:'#bbf7d0',name:'Сходження',sym:'▲'},
    descent:       {bg:'#140a0a',edge:'#7f1d1d',accent:'#fca5a5',name:'Спуск',sym:'▼'},
    echo:          {bg:'#0a0f16',edge:'#3b82f6',accent:'#93c5fd',name:'Відлуння',sym:'◈'},
    noise:         {bg:'#160a14',edge:'#a21caf',accent:'#f0abfc',name:'Шум',sym:'※'},
    ascension_echo:{bg:'#0a1416',edge:'#22d3ee',accent:'#a5f3fc',name:'Храм Світла',sym:'✦'},
    ascension_noise:{bg:'#141014',edge:'#fbbf24',accent:'#fde68a',name:'Спалах',sym:'❋'},
    descent_echo:  {bg:'#0f0c14',edge:'#6366f1',accent:'#c7d2fe',name:'Механізм',sym:'⬢'},
    descent_noise: {bg:'#120608',edge:'#dc2626',accent:'#fecaca',name:'Безодня',sym:'✖'},
  };
  const pal=PAL[archetype]||PAL.center;
  return{
    archetype,weight,axisV,axisH,
    bg:pal.bg,edge:pal.edge,accent:pal.accent,name:pal.name,sym:pal.sym,
    // Геймплейні модифікатори:
    enemyDensity:3+weight*6,              // 3 в центрі → 9 на периферії
    orderFactor:(axisH+1)/2,             // 1=порядок(рівні стіни), 0=хаос(розкидано)
    lightFactor:(axisV+1)/2,             // 1=світло(менше перешкод), 0=ерозія(руїни)
    bossChance:weight>0.6?0.35:weight>0.35?0.15:0,
  };
}

// ── ГЕНЕРАЦІЯ КІМНАТИ ЗА КООРДИНАТОЮ МЕТАСІТКИ (зі стилем) ───────────────
function generateRoomAt(mx,my,diff){
  const st=roomStyle(mx,my);
  const _dCfg=DIFFICULTY[diff||'normal']||DIFFICULTY.normal;
  const occ=[{x:CX,y:CY}];
  const objects=[];
  // Кількість ворогів за щільністю стилю
  const enemyCount=Math.max(2,Math.round(st.enemyDensity*(0.6+_dCfg.enemyHp*0.3)));
  const isBoss=Math.random()<st.bossChance;
  // Перешкоди: порядок→рівні стіни, хаос→розкидані руїни
  const objCount=Math.round(2+st.weight*6);
  const orderly=st.orderFactor>0.6;
  for(let i=0;i<objCount*6&&objects.length<objCount;i++){
    let x,y;
    if(orderly){
      // Порядок: вирівняні по сітці (парні координати)
      x=2+2*Math.floor(Math.random()*5);y=2+2*Math.floor(Math.random()*5);
    }else{
      x=1+Math.floor(Math.random()*(G-2));y=1+Math.floor(Math.random()*(G-2));
    }
    if(occ.some(o=>Math.abs(o.x-x)+Math.abs(o.y-y)<(orderly?2:3)))continue;
    // Ерозія(низький light)→більше руйнівних(crate/barrel), Світло→стовпи/стіни
    const ruinPool=st.lightFactor<0.4?['crate','barrel','crate','wall']:['pillar','wall','pillar'];
    const t=isBoss?'pillar':ruinPool[Math.floor(Math.random()*ruinPool.length)];
    const ot=OBJ_TYPES[t];if(!ot)continue;
    objects.push({id:EID++,type:t,x,y,hp:ot.hp??null});occ.push({x,y});
  }
  // Лут: 2 предмети (більше на периферії)
  const lootCount=st.weight>0.5?3:2;
  const lootKeys=Object.keys(OBJ_TYPES).filter(k=>OBJ_TYPES[k].isLoot);
  // 40% chance to guarantee a spell scroll
  const picks=[...lootKeys].sort(()=>Math.random()-.5).slice(0,lootCount);
  if(Math.random()<0.4&&!picks.includes('upg_spell'))picks[0]='upg_spell';
  for(const lt of picks){
    for(let i=0;i<40;i++){
      const x=1+Math.floor(Math.random()*(G-2)),y=1+Math.floor(Math.random()*(G-2));
      if(occ.some(o=>Math.abs(o.x-x)+Math.abs(o.y-y)<2))continue;
      objects.push({id:EID++,type:lt,x,y,hp:null});occ.push({x,y});break;
    }
  }
  let enemies=[];
  if(isBoss){
    const bossKeys=Object.keys(BOSS_DEFS);
    // Архетип впливає на тип боса
    const bk=st.archetype.includes('descent')?'juggernaut':st.archetype.includes('ascension')?'wraith':st.archetype.includes('echo')?'colossus':'devourer';
    const bd=BOSS_DEFS[bk]||BOSS_DEFS.colossus;
    const hp=Math.round(bd.basehp*_dCfg.enemyHp*(0.8+st.weight));
    const bx=CX-Math.floor((bd.size-1)/2),by=CY-Math.floor((bd.size-1)/2);
    enemies.push({id:EID++,type:'boss',bossKind:bk,x:clamp(bx,0,G-bd.size),y:clamp(by,0,G-bd.size),hp,maxHp:hp,dmg:Math.round(bd.dmg*_dCfg.enemyDmg),ms:bd.ms,size:bd.size,sym:bd.sym,col:bd.col,name:bd.name,bossRoomIdx:Math.ceil(st.weight*3),lastMove:0});
  }else{
    const types=Object.keys(ET);
    for(let i=0;i<enemyCount;i++){
      const t=types[Math.floor(Math.random()*types.length)];const e=spawnE(t,occ);
      if(e){e.hp=Math.max(1,Math.round(e.hp*_dCfg.enemyHp));e.maxHp=e.hp;enemies.push(e);occ.push({x:e.x,y:e.y});}
    }
  }
  return{enemies,objects,isBoss,style:st};
}

// ── ХАБ (нульова кімната) — без ворогів, вибір напрямку ──────────────────
function generateHub(){
  const objects=[];
  // Декоративні стовпи по кутах внутрішнього простору
  const deco=[[3,3],[9,3],[3,9],[9,9]];
  deco.forEach(([x,y])=>objects.push({id:EID++,type:'pillar',x,y,hp:null}));
  return{enemies:[],objects,isBoss:false,isHub:true,style:roomStyle(META_CENTER,META_CENTER)};
}

function generateRoom(roomNum,spawnX,spawnY,diff){
  const isBoss=roomNum>1&&roomNum%3===0;
  const _dCfg=DIFFICULTY[diff||'normal']||DIFFICULTY.normal;
  const occ=[{x:spawnX??CX,y:spawnY??CY}];
  const objects=[];
  const objCount=isBoss?4:Math.min(2+Math.floor(roomNum/2),8);
  for(let i=0;i<objCount*5&&objects.length<objCount;i++){
    const x=1+Math.floor(Math.random()*(G-2));const y=1+Math.floor(Math.random()*(G-2));
    if(occ.some(o=>Math.abs(o.x-x)+Math.abs(o.y-y)<3))continue;
    const t=isBoss?'pillar':['pillar','wall','crate','barrel'][Math.floor(Math.random()*4)];
    const ot=OBJ_TYPES[t];if(!ot)continue;
    objects.push({id:EID++,type:t,x,y,hp:ot.hp??null});occ.push({x,y});
  }
  if(!isBoss){
    // 2 guaranteed unique loot items per room, no duplicate types
    const lootKeys=Object.keys(OBJ_TYPES).filter(k=>OBJ_TYPES[k].isLoot);
    const picks=[...lootKeys].sort(()=>Math.random()-.5).slice(0,2);
    for(const lt of picks){
      for(let i=0;i<40;i++){
        const x=1+Math.floor(Math.random()*(G-2));
        const y=1+Math.floor(Math.random()*(G-2));
        if(occ.some(o=>Math.abs(o.x-x)+Math.abs(o.y-y)<2))continue;
        objects.push({id:EID++,type:lt,x,y,hp:null});occ.push({x,y});break;
      }
    }
  }
  let enemies=[];
  if(isBoss){
    const bossRoomIdx=Math.floor(roomNum/3); // 1=room3, 2=room6, 3=room9...
    const scale=Math.max(1,1+(bossRoomIdx-1)*0.7); // steeper scaling: +70% per boss tier
    const numBosses=bossRoomIdx>=2?2:1; // 2 bosses from room 6 onward
    enemies=[];
    const usedBossPos=[];
    for(let b=0;b<numBosses;b++){
      const bKeys=Object.keys(BOSS_DEFS);
      const bType=bKeys[Math.floor(Math.random()*bKeys.length)];
      const bd=BOSS_DEFS[bType];
      // Position: boss 0 top-left area, boss 1 bottom-right area
      let bx,by;
      if(numBosses===1){
        bx=Math.max(0,Math.min(G-bd.size,Math.floor(G/2)-Math.floor(bd.size/2)));
        by=Math.max(0,Math.min(G-bd.size,Math.floor(G/2)-Math.floor(bd.size/2)));
      }else{
        const offsets=[[1,1],[G-bd.size-1,G-bd.size-1]];
        const[ox,oy]=offsets[b%2];
        bx=Math.max(0,Math.min(G-bd.size,ox));
        by=Math.max(0,Math.min(G-bd.size,oy));
      }
      // Avoid overlap with other boss
      if(usedBossPos.some(p=>Math.abs(p.x-bx)+Math.abs(p.y-by)<4)) bx=Math.min(G-bd.size,bx+3);
      usedBossPos.push({x:bx,y:by});
      enemies.push({id:EID++,type:'boss',bossType:bType,x:bx,y:by,
        hp:Math.round(bd.basehp*scale*_dCfg.enemyHp),
        maxHp:Math.round(bd.basehp*scale*_dCfg.enemyHp),
        dmg:Math.round(bd.dmg*scale*_dCfg.enemyDmg),
        ms:Math.round(bd.ms/Math.sqrt(scale)),
        size:bd.size,col:bd.col,sym:bd.sym,name:bd.name,lastMove:0,
        bossRoomIdx}); // store tier for loot scaling
    }
  }else{
    const etAll=Object.keys(ET);const etAvail=etAll.slice(0,Math.min(etAll.length,1+Math.floor(roomNum/2)));
    const count=Math.max(1,Math.round(1+roomNum*0.55));const spOcc=[...occ];
    for(let i=0;i<count;i++){const t=etAvail[Math.floor(Math.random()*etAvail.length)];const e=spawnE(t,spOcc);if(e){enemies.push(e);spOcc.push({x:e.x,y:e.y});}}
    // Apply difficulty HP scaling
    const _hm=_dCfg.enemyHp;
    enemies=enemies.map(e=>({...e,hp:Math.max(1,Math.round(e.hp*_hm)),maxHp:Math.max(1,Math.round(e.hp*_hm))}));
  }
  return{objects,enemies,isBoss};
}

function getWCells(px,py,yi,wk,extraReach=0){
  const w=WPN[wk],cells=[];
  const inB=(x,y)=>x>=0&&x<G&&y>=0&&y<G;
  const add=(x,y,main,extra)=>{if(inB(x,y)&&!cells.some(c=>c.x===x&&c.y===y))cells.push({x,y,main,extra});};
  const[dx,dy]=DIR[yi];

  // ── ЛУК (ranged): постріл лише в ОДНУ далеку клітинку (снаряд) ──
  // Кожен артефакт = +1 дальність пострілу. Б'є тільки кінцеву клітинку.
  if(w.ranged){
    const dist=w.reach+extraReach;
    let tx=px,ty=py;
    for(let r=1;r<=dist;r++){const nx=px+dx*r,ny=py+dy*r;if(!inB(nx,ny))break;tx=nx;ty=ny;}
    if(tx!==px||ty!==py)add(tx,ty,true,extraReach>0);
    return cells;
  }

  // ── ЦІП (sweep): будує коло навколо ПО 1 КЛІТИНЦІ за артефакт ──
  // Спочатку внутрішнє кільце (8 клітинок), потім зовнішнє. Кожне кільце
  // потребує все більше артефактів (повільніше, але щільніше).
  if(w.sweep){
    // Порядок клітинок кілець: спочатку напрямок погляду, потім за годинниковою
    const ringCells=(r)=>{
      const out=[];
      for(let a=0;a<8;a++){const[ax,ay]=DIR[a];out.push({x:px+ax*r,y:py+ay*r,ringIdx:a});}
      // Почати з напрямку погляду yi, далі по колу
      return out.sort((p,q)=>((p.ringIdx-yi+8)%8)-((q.ringIdx-yi+8)%8));
    };
    // Базова форма: 1 клітинка спереду (radius 1)
    let budget=1+extraReach; // всього клітинок = база(1) + артефакти
    let r=1;
    while(budget>0&&r<=6){
      const ring=ringCells(r);
      // Скільки клітинок цього кільця можна додати
      const take=Math.min(budget,ring.length);
      for(let i=0;i<take;i++){add(ring[i].x,ring[i].y,r===1,r>1);}
      budget-=take;
      // Наступне кільце "дорожче": пропускаємо частину бюджету (повільніше зростання)
      if(budget>0&&take===ring.length){budget-=Math.floor(r/2);} // штраф за глибину
      r++;
    }
    return cells;
  }

  // ── СПИС (arc=0, не ranged): суцільна ЛІНІЯ вперед, +1 клітинка/артефакт ──
  if(w.arc===0){
    const len=w.reach+extraReach;
    for(let r=1;r<=len;r++){add(px+dx*r,py+dy*r,r<=1,r>w.reach);}
    return cells;
  }

  // ── СОКИРА/ДВОРУЧНИК/МЕЧ/КИНДЖАЛ (arc>=1): дуга, що росте ПО 1 КЛІТИНЦІ ──
  // Базова дуга на reach. Кожен артефакт додає 1 клітинку наступного шару,
  // заповнюючи форму поступово (порушуючи симетрію), поки шар не завершиться.
  // Спочатку будуємо базову форму (всі клітинки на дистанції <= reach в дузі)
  const arcDirs=[];
  arcDirs.push(yi); // центр (погляд)
  for(let s=1;s<=w.arc;s++){arcDirs.push((yi+s+8)%8);arcDirs.push((yi-s+8)%8);}
  // Базові клітинки: кожен напрям дуги на кожній відстані 1..reach
  for(let r=1;r<=w.reach;r++){
    for(const ad of arcDirs){const[ax,ay]=DIR[ad];add(px+ax*r,py+ay*r,r<=1,false);}
  }
  // Артефакти: додаємо клітинки наступних шарів ПО ОДНІЙ.
  // Порядок: для кожного нового шару r=reach+1, reach+2... проходимо дугу від центру.
  let remaining=extraReach;
  let layer=w.reach+1;
  while(remaining>0&&layer<=8){
    // Клітинки цього шару в порядку: центр, потім розширення дуги
    const layerCells=[];
    for(const ad of arcDirs){const[ax,ay]=DIR[ad];layerCells.push({x:px+ax*layer,y:py+ay*layer});}
    // Додаємо по одній клітинці, поки є артефакти або шар не вичерпано
    for(let i=0;i<layerCells.length&&remaining>0;i++){
      const lc=layerCells[i];
      if(inB(lc.x,lc.y)&&!cells.some(c=>c.x===lc.x&&c.y===lc.y)){
        add(lc.x,lc.y,false,true);remaining--;
      }
    }
    layer++;
  }
  return cells;
}
function spawnE(type,occ){
  const edges=[];for(let x=0;x<G;x++){edges.push({x,y:0});edges.push({x,y:G-1});}for(let y=1;y<G-1;y++){edges.push({x:0,y});edges.push({x:G-1,y});}
  const free=edges.filter(c=>!occ.some(o=>o.x===c.x&&o.y===c.y));if(!free.length)return null;
  const p=free[Math.floor(Math.random()*free.length)];
  return{id:EID++,type,x:p.x,y:p.y,hp:ET[type].hp,maxHp:ET[type].hp,lastMove:0};
}
function toScreen(gx,gy,px,py,cDeg){const rx=gx-px,ry=gy-py,a=-rad(cDeg);return{sx:Math.round(CX+rx*Math.cos(a)-ry*Math.sin(a)),sy:Math.round(CY+rx*Math.sin(a)+ry*Math.cos(a))};}
// Inverse of toScreen: screen cell → world cell
function fromScreen(sx,sy,px,py,cDeg){
  const rx=sx-CX,ry=sy-CY,a=rad(cDeg);
  return{gx:Math.round(px+rx*Math.cos(a)-ry*Math.sin(a)),gy:Math.round(py+rx*Math.sin(a)+ry*Math.cos(a))};
}
function swipeToWorld(sdx,sdy,cDeg){const a=rad(cDeg);return{gdx:Math.round(sdx*Math.cos(a)-sdy*Math.sin(a)),gdy:Math.round(sdx*Math.sin(a)+sdy*Math.cos(a))};}
function betaToPitch(b,sens){return clamp((b-40)/sens,-1,1);}
function pColor(p){return p<-0.3?'#22c55e':p>0.3?'#ef4444':'#f59e0b';}

// ── MORSE BAR (завжди видимий) ────────────────────────────────────
function SpellChip({sp,currentSeq,unlocked}){
  const locked=unlocked&&!unlocked.includes(sp.code);
  const matching=!locked&&currentSeq&&sp.code.startsWith(currentSeq);
  const exact=!locked&&currentSeq&&sp.code===currentSeq;
  const typing=currentSeq&&currentSeq.length>0;
  // When typing: matching spells glow, non-matching fade
  const op=locked?0.22:(typing&&!matching?0.25:1);
  return(<div style={{width:'calc(12.5% - 3px)',opacity:op,background:exact?sp.col+'55':matching?sp.col+'22':'#060f1e',border:`1px solid ${exact?sp.col:matching?sp.col:locked?'#0a1628':'#1e3a5f'}`,borderRadius:'3px',padding:'2px 3px',textAlign:'center',transition:'all .15s',boxShadow:exact?`0 0 8px ${sp.col}`:'none',transform:exact?'scale(1.08)':'scale(1)'}}>
    <div style={{fontSize:'8px'}}>{locked?'🔒':sp.code.split('').map((s,i)=>{
      const typed=currentSeq&&i<currentSeq.length;
      return <span key={i} style={{color:typed?(s==='.'?'#93c5fd':'#fcd34d'):(s==='.'?'#60a5fa':'#f59e0b'),fontWeight:typed?'bold':'normal'}}>{s}</span>;
    })}</div>
    <div style={{fontSize:'7px',color:locked?'#1e3a5f':sp.col,overflow:'hidden',whiteSpace:'nowrap'}}>{locked?'???':sp.name}</div>
  </div>);
}
function MorseBar({currentSeq,unlocked}){
  return(
    <div style={{width:'100%',maxWidth:'480px',padding:'3px 8px 4px',display:'flex',flexWrap:'wrap',gap:'3px',flexShrink:0}}>
      {SPELLS.map(sp=>(
        <SpellChip key={sp.code} sp={sp} currentSeq={currentSeq} unlocked={unlocked}/>
      ))}
    </div>
  );
}

function B2({children,onClick,col='#60a5fa',style={}}){return(<button onClick={onClick} style={{width:'100%',padding:'11px',background:col+'22',border:`1px solid ${col}`,color:col,borderRadius:'6px',cursor:'pointer',fontSize:'12px',fontFamily:"'Courier New',monospace",letterSpacing:'.06em',...style}}>{children}</button>);}

    const oa=(e)=>{if(e.alpha!=null)setLive(p=>({...p,compass:(360-e.alpha)%360}));};
    const m=(e)=>{const g=e.accelerationIncludingGravity;if(!g)return;setLive(p=>({...p,mag:Math.sqrt((g.x??0)**2+(g.y??0)**2+(g.z??9.8)**2)}));};
    window.addEventListener('deviceorientation',o,true);window.addEventListener('deviceorientationabsolute',oa,true);window.addEventListener('devicemotion',m);
    return()=>{window.removeEventListener('deviceorientation',o,true);window.removeEventListener('deviceorientationabsolute',oa,true);window.removeEventListener('devicemotion',m);};

                <span>{lbl}</span><span style={{fontSize:'8px',color:'#1e3a5f'}}>{desc}</span>

          <div style={{display:'flex',gap:'6px'}}>

              <button key={n} onClick={()=>setS(p=>({...p,maxPlayers:n}))} style={{flex:1,padding:'10px',background:(s.maxPlayers||2)===n?'#1e3a8a33':'#060f1e',border:`1px solid ${(s.maxPlayers||2)===n?'#60a5fa':'#1e3a5f'}`,color:(s.maxPlayers||2)===n?'#60a5fa':'#334155',borderRadius:'6px',cursor:'pointer',fontFamily:'inherit',fontSize:'14px',fontWeight:'bold'}}>{n}</button>

// ── WARNING ───────────────────────────────────────────────────────
function Warning({onOk,setSPhase,t=k=>k}){
  const[ok,setOk]=useState(false);
  const[asking,setAsking]=useState(false);

  const handleContinue=async()=>{
    if(!ok||asking)return;
    setAsking(true);
    try{
      if(typeof DeviceOrientationEvent?.requestPermission==='function')
        if(await DeviceOrientationEvent.requestPermission()!=='granted')throw 0;
      if(typeof DeviceMotionEvent?.requestPermission==='function')
        if(await DeviceMotionEvent.requestPermission()!=='granted')throw 0;
      setSPhase('active');
    }catch{setSPhase('denied');}
    setAsking(false);
    onOk();
  };

  return(<div style={{background:'#010d1f',flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontFamily:"'Courier New',monospace",padding:'20px',gap:'12px'}}>
    <div style={{fontSize:'36px'}}>⚠️</div>
    <div style={{color:'#f59e0b',fontSize:'15px',fontWeight:'bold'}}>УВАГА!</div>
    <div style={{color:'#4a6a9f',fontSize:'10px',textAlign:'center',lineHeight:2,maxWidth:'300px',background:'#060f1e',border:'1px solid #78350f',borderRadius:'8px',padding:'14px'}}>
      Гра вимагає фізичних рухів смартфоном.<br/>
      <span style={{color:'#ef4444',fontWeight:'bold'}}>НЕ розбий телефон!</span><br/>
      Грай в безпечному відкритому місці.<br/>
      Переконайся що навколо нікого немає.<br/>
      <span style={{color:'#334155'}}>Рекомендується ремінець на зап'ясті.</span>
    </div>
    {asking&&<div style={{color:'#f59e0b',fontSize:'11px',animation:'pulse .5s infinite'}}>⏳ Підключення датчиків...</div>}
    <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer',color:'#4a6a9f',fontSize:'11px'}}>
      <input type="checkbox" checked={ok} onChange={e=>setOk(e.target.checked)} style={{width:'18px',height:'18px',cursor:'pointer'}}/>
      Я розумію і граю обережно
    </label>
    <B2 onClick={ok&&!asking?handleContinue:undefined} col={ok?'#22c55e':'#1e3a5f'} style={{maxWidth:'260px',opacity:ok&&!asking?1:.5}}>
      {asking?'⏳ Запит дозволів...':ok?t('continue'):t('confirmFirst')}
    </B2>
  </div>);
}

// ── PROGRESSION (localStorage) ──────────────────────────────────────────
function loadProg(){
  try{const p=JSON.parse(localStorage.getItem('myr13_prog')||'{}');
    return{level:p.level||1,xp:p.xp||0,kills:p.kills||0,deaths:p.deaths||0,wins:p.wins||0,games:p.games||0,bestScore:p.bestScore||0};
  }catch(e){return{level:1,xp:0,kills:0,deaths:0,wins:0,games:0,bestScore:0};}
}
function saveProg(p){try{localStorage.setItem('myr13_prog',JSON.stringify(p));}catch(e){}}
function xpForLevel(lvl){return lvl*100;} // xp needed to reach next level
function addXp(prog,amount){
  prog.xp+=amount;
  while(prog.xp>=xpForLevel(prog.level)){prog.xp-=xpForLevel(prog.level);prog.level++;}
  return prog;
}

// ── SESSION (reconnection) ──────────────────────────────────────────────
function saveSession(s){try{localStorage.setItem('myr13_session',JSON.stringify({...s,ts:Date.now()}));}catch(e){}}
function loadSession(){try{const s=JSON.parse(localStorage.getItem('myr13_session')||'null');if(!s)return null;if(Date.now()-(s.ts||0)>30*60*1000)return null;return s;}catch(e){return null;}}
function clearSession(){try{localStorage.removeItem('myr13_session');}catch(e){}}

// ── BOT AI ──────────────────────────────────────────────────────────────
// Bots imitate player behavior: seek enemies/loot, attack, dodge
const BOT_NAMES=['Бот-Альфа','Бот-Браво','Бот-Чарлі','Бот-Дельта'];
function botThink(bot,rs,allP,roomId){
  if(!bot.alive)return;
  const now=Date.now();
  if(now-(bot._lastAct||0)<bot._reactMs)return;
  bot._lastAct=now;
  const enemies=rs.enemies||[];
  const objects=rs.objects||[];
  const mpMode=rs.mpMode;

  // Find target: nearest enemy OR (in duel) nearest opponent player
  let targets=[];
  if(mpMode==='duel_1v1'||mpMode==='duel_2v2'){
    targets=Object.values(allP).filter(p=>p.alive&&p.id!==bot.id&&(mpMode==='duel_1v1'||((p.slot||0)<2)!==((bot.slot||0)<2))).map(p=>({x:p.x,y:p.y,isPlayer:true,id:p.id}));
  }else{
    targets=enemies.map(e=>({x:e.x,y:e.y,isPlayer:false,e}));
  }
  if(!targets.length){
    // No targets — seek loot
    const loot=objects.filter(o=>OBJ_TYPES[o.type]?.isLoot);
    if(loot.length){let nl=loot[0],nd=999;loot.forEach(l=>{const d=Math.abs(l.x-bot.x)+Math.abs(l.y-bot.y);if(d<nd){nd=d;nl=l;}});targets=[{x:nl.x,y:nl.y,isLoot:true}];}
  }
  if(!targets.length){
    // ── COORDINATED EDGE GATHERING (coop adventure, room cleared) ──
    if(mpMode==='coop_adventure'&&!enemies.length){
      const all=Object.values(allP).filter(p=>p.alive&&!p.isSpectator);
      const humans=all.filter(p=>!p.isBot);
      const edgeOf=p=>{const px=p.x||0,py=p.y||0;if(py===0)return'N';if(py===G-1)return'S';if(px===0)return'W';if(px===G-1)return'E';return null;};
      // Decide TARGET edge for the whole team:
      let teamEdge=null;
      // 1) If any human is on an edge → bots follow to THAT edge
      const humanOnEdge=humans.map(edgeOf).find(e=>e!==null);
      if(humanOnEdge)teamEdge=humanOnEdge;
      // 2) Else if humans exist (not on edge) → bots follow nearest human, don't pick edge yet
      else if(humans.length>0){
        let nh=humans[0],nd=999;humans.forEach(h=>{const d=Math.abs(h.x-bot.x)+Math.abs(h.y-bot.y);if(d<nd){nd=d;nh=h;}});
        targets=[{x:nh.x,y:nh.y,isFollow:true}];
      }
      // 3) No humans (all bots) → team picks ONE edge by consensus (lowest bot id decides)
      else{
        const bots=all.filter(p=>p.isBot).sort((a,b)=>(a.id<b.id?-1:1));
        const leader=bots[0];
        // Leader picks its nearest edge; everyone targets it. Store on rs for stability.
        if(!rs._botTeamEdge||rs._botTeamEdgeTs<now-8000){
          const lead=leader||bot;
          const dists={N:lead.y,S:G-1-lead.y,W:lead.x,E:G-1-lead.x};
          rs._botTeamEdge=Object.keys(dists).sort((a,b)=>dists[a]-dists[b])[0];
          rs._botTeamEdgeTs=now;
        }
        teamEdge=rs._botTeamEdge;
      }
      // Move toward chosen team edge. Each bot claims the nearest FREE cell on that edge.
      if(teamEdge&&!targets.length){
        // Build the line of cells along the chosen edge (excluding corners)
        const edgeCells=[];
        for(let i=1;i<=G-2;i++){
          if(teamEdge==='W')edgeCells.push({x:0,y:i});
          else if(teamEdge==='E')edgeCells.push({x:G-1,y:i});
          else if(teamEdge==='N')edgeCells.push({x:i,y:0});
          else edgeCells.push({x:i,y:G-1});
        }
        // Cells occupied by OTHER alive entities
        const occupied=(x,y)=>all.some(p=>p.id!==bot.id&&(p.x||0)===x&&(p.y||0)===y);
        // If bot is already standing on the target edge in a free spot — done
        const botOnEdge=(teamEdge==='W'&&bot.x===0)||(teamEdge==='E'&&bot.x===G-1)||(teamEdge==='N'&&bot.y===0)||(teamEdge==='S'&&bot.y===G-1);
        if(botOnEdge){targets=[{x:bot.x,y:bot.y,isEdge:true}];}
        else{
          // Pick nearest FREE edge cell to this bot
          const freeCells=edgeCells.filter(ec=>!occupied(ec.x,ec.y));
          const pool=freeCells.length?freeCells:edgeCells;
          let best=pool[0],bd=999;
          pool.forEach(ec=>{const d=Math.abs(ec.x-bot.x)+Math.abs(ec.y-bot.y);if(d<bd){bd=d;best=ec;}});
          targets=[{x:best.x,y:best.y,isEdge:true}];
        }
      }
    }
    if(!targets.length)return;
  }

  // Nearest target
  let tgt=targets[0],td=999;
  targets.forEach(t=>{const d=Math.abs(t.x-bot.x)+Math.abs(t.y-bot.y);if(d<td){td=d;tgt=t;}});

  // If adjacent to enemy/opponent → attack
  const wpn=WPN[bot.wpn]||WPN.sword;
  const reach=wpn.reach+(bot.weaponMods?.reach||0);
  if(td<=reach&&!tgt.isLoot&&!tgt.isEdge&&bot.stamina>15){
    // Aim yawIdx toward target
    const dx=tgt.x-bot.x,dy=tgt.y-bot.y;
    bot.yawIdx=dirToYaw(dx,dy);
    bot._wantAttack=true;
    return;
  }
  // ── Move toward target with robust obstacle avoidance ──
  const isBlocked=(nx,ny)=>{
    if(nx<0||nx>=G||ny<0||ny>=G)return true;
    if(enemies.some(e=>e.type!=='boss'&&e.x===nx&&e.y===ny))return true;
    if(enemies.some(e=>e.type==='boss'&&calcBossCells(e.x,e.y,e.size||1).some(bc=>bc.x===nx&&bc.y===ny)))return true;
    if(objects.some(o=>OBJ_TYPES[o.type]?.blocksMove&&o.x===nx&&o.y===ny))return true;
    if(Object.values(allP).some(p=>p.id!==bot.id&&p.alive&&!p.isSpectator&&p.x===nx&&p.y===ny))return true;
    return false;
  };
  const tdx=tgt.x-bot.x,tdy=tgt.y-bot.y;
  const curD=Math.abs(tdx)+Math.abs(tdy);
  // ── STOP CONDITION: if at edge target, HOLD POSITION (don't jitter) ──
  if(tgt.isEdge){
    const onTargetEdge=(bot.x===0&&tgt.x===0)||(bot.x===G-1&&tgt.x===G-1)||(bot.y===0&&tgt.y===0)||(bot.y===G-1&&tgt.y===G-1);
    if(onTargetEdge){bot._stuck=0;return;}
    if(curD===0){bot._stuck=0;return;}
  }
  if(tgt.isFollow&&curD<=1){bot._stuck=0;return;}
  if(curD===0){bot._stuck=0;return;}

  // ── BFS PATHFINDING: finds shortest path around ANY obstacle (walls, bots, bosses) ──
  const tx=clamp(tgt.x,0,G-1),ty=clamp(tgt.y,0,G-1);
  const key=(x,y)=>y*G+x;
  const startK=key(bot.x,bot.y);
  // 4-directional BFS (orthogonal moves) from bot to target
  const queue=[[bot.x,bot.y]];
  const cameFrom=new Map();cameFrom.set(startK,null);
  let found=false;
  const ORTHO=[[0,-1],[0,1],[-1,0],[1,0]];
  let head=0;
  while(head<queue.length){
    const[cx,cy]=queue[head++];
    if(cx===tx&&cy===ty){found=true;break;}
    // Explore neighbors (shuffle order slightly for natural movement)
    const dirs=ORTHO;
    for(const[mx,my]of dirs){
      const nx=cx+mx,ny=cy+my;const nk=key(nx,ny);
      if(cameFrom.has(nk))continue;
      // Target cell is always enterable even if "blocked" (so bot can reach an occupied-looking goal)
      const isTarget=(nx===tx&&ny===ty);
      if(!isTarget&&isBlocked(nx,ny))continue;
      cameFrom.set(nk,[cx,cy]);
      queue.push([nx,ny]);
    }
  }
  let moved=false;
  if(found){
    // Reconstruct path, find FIRST step from bot
    let cur=[tx,ty];const path=[];
    while(cur){path.push(cur);const prev=cameFrom.get(key(cur[0],cur[1]));cur=prev;}
    path.reverse(); // path[0]=bot position, path[1]=first step
    if(path.length>=2){
      const[nx,ny]=path[1];
      if(!isBlocked(nx,ny)||(nx===tx&&ny===ty&&path.length===2)){
        // Don't step onto the target if it's an occupied entity (stop adjacent)
        if(isBlocked(nx,ny)&&!(nx===bot.x&&ny===bot.y)){
          // Target itself is blocked (e.g. another player) — we're adjacent, hold
          bot._stuck=0;
        }else{
          bot.x=nx;bot.y=ny;bot.yawIdx=dirToYaw(nx-path[0][0],ny-path[0][1]);moved=true;bot._stuck=0;
        }
      }
    }else{bot._stuck=0;} // already at target
  }
  if(!found||!moved){
    // No path found (fully surrounded) — try greedy fallback to at least not freeze
    bot._stuck=(bot._stuck||0)+1;
    const fallback=[[Math.sign(tdx),0],[0,Math.sign(tdy)],[0,1],[0,-1],[1,0],[-1,0]].filter(([mx,my])=>mx||my);
    const opts=fallback.map(([mx,my])=>{const nx=bot.x+mx,ny=bot.y+my;if(isBlocked(nx,ny))return null;return{nx,ny,mx,my,d:Math.abs(tx-nx)+Math.abs(ty-ny)};}).filter(Boolean).sort((a,b)=>a.d-b.d);
    if(opts.length&&bot._stuck>=2){const o=opts[0];bot.x=o.nx;bot.y=o.ny;bot.yawIdx=dirToYaw(o.mx,o.my);}
  }
}
function dirToYaw(dx,dy){
  // 8-direction from dx,dy
  if(dx===0&&dy<0)return 0;if(dx>0&&dy<0)return 1;if(dx>0&&dy===0)return 2;if(dx>0&&dy>0)return 3;
  if(dx===0&&dy>0)return 4;if(dx<0&&dy>0)return 5;if(dx<0&&dy===0)return 6;return 7;
}

function Lobby({settings,onStart,t=k=>k}){
  const[phase,setPhase]=useState('menu');
  const[myName,setMyName]=useState('');
  const[myWpn,setMyWpn]=useState(settings.startWpn||'sword');
  const[asSpectator,setAsSpectator]=useState(false);
  const[hostIsSpectator,setHostIsSpectator]=useState(false);
  const[codeInput,setCodeInput]=useState('');
  const[roomCode,setRoomCode]=useState('');
  const[myId,setMyId]=useState('');
  const[isHost,setIsHost]=useState(false);
  const[waitPlayers,setWaitPlayers]=useState({});
  const[status,setStatus]=useState('');
  const cln=useRef([]);
  const cleanup=useCallback(()=>{cln.current.forEach(f=>f());cln.current=[];},[]);

  const handleCreate=async(spectatorHost=false)=>{
    if(!myName.trim()){setStatus("Введіть ім'я");return;}
    const id=generateRoomId(),pid=spectatorHost?'hspec'+Date.now():'h'+Date.now();
    setRoomCode(id);setMyId(pid);setIsHost(true);setHostIsSpectator(spectatorHost);
    const dCfg=DIFFICULTY[settings.difficulty||'normal']||DIFFICULTY.normal;
    const hp=Math.round(100*dCfg.playerHp);
    const baseInfo={host:pid,hostSpectator:spectatorHost,mpMode:settings.mpMode||'coop_adventure',maxPlayers:settings.maxPlayers||2,friendlyFire:!!settings.friendlyFire,difficulty:settings.difficulty||'normal',startWpn:myWpn,strikeThr:settings.strikeThr||7,pitchSens:settings.pitchSens||40,status:'waiting'};
    if(spectatorHost){
      // Host is spectator — not a player. Store as spectator entry.
      fbSet(`mp/${id}`,{info:baseInfo,players:{},spectators:{[pid]:{name:myName.trim()}}});
    }else{
      fbSet(`mp/${id}`,{info:baseInfo,players:{[pid]:{name:myName.trim(),slot:0,hp,maxHp:hp,alive:true,wpn:myWpn,...getSpawnPos(0),yawIdx:0,compassD:0,stamina:100,weaponMods:{reach:0,weight:1,sharpness:1},score:0}}});
    }
    cln.current.push(fbOn(`mp/${id}/players`,ps=>{setWaitPlayers(ps||{});}));
    setPhase('wait');
  };

  const handleJoin=async()=>{
    if(!myName.trim()||!codeInput.trim()){setStatus("Введіть ім'я та код");return;}
    const id=codeInput.trim().toUpperCase();
    let done=false;
    const u=fbOn(`mp/${id}/info`,info=>{
      if(done)return;
      if(!info){setStatus('Кімнату не знайдено');u();return;}
      done=true;
      // Spectator can join even mid-game
      if(asSpectator){
        const sid='spec_'+Date.now();
        setRoomCode(id);setMyId(sid);setIsHost(false);
        u();
        if(info.status==='playing'){cleanup();onStart({roomId:id,myId:sid,isHost:false,roomInfo:info,spectator:true});}
        else{const u3=fbOn(`mp/${id}/info/status`,st=>{if(st==='playing'){u3();cleanup();onStart({roomId:id,myId:sid,isHost:false,roomInfo:info,spectator:true});}});cln.current.push(u3);
          const u4=fbOn(`mp/${id}/players`,ps=>{if(ps)setWaitPlayers(ps);});cln.current.push(u4);setPhase('wait');setStatus('Спостерігач — очікуємо старту');}
        return;
      }
      if(info.status==='playing'){setStatus('Гра вже почалась (можна як 👁 спостерігач)');return;}
      const u2=fbOn(`mp/${id}/players`,ps=>{
        if(!ps)return;
        const cnt=Object.keys(ps).length;
        if(cnt>=(info.maxPlayers||2)){setStatus(`Кімната повна (${cnt}/${info.maxPlayers||2})`);u2();u();return;}
        const pid='p'+Date.now(),slot=cnt;
        const dCfg=DIFFICULTY[info.difficulty||'normal']||DIFFICULTY.normal;
        const hp=Math.round(100*dCfg.playerHp);
        fbSet(`mp/${id}/players/${pid}`,{name:myName.trim(),slot,hp,maxHp:hp,alive:true,wpn:myWpn,...getSpawnPos(slot),yawIdx:slot===1?4:0,compassD:slot===1?180:0,stamina:100,weaponMods:{reach:0,weight:1,sharpness:1},score:0});
        setRoomCode(id);setMyId(pid);setIsHost(false);
        const u3=fbOn(`mp/${id}/players`,ps2=>{if(ps2)setWaitPlayers(ps2);});
        const u4=fbOn(`mp/${id}/info/status`,st=>{if(st==='playing'){u4();cleanup();onStart({roomId:id,myId:pid,isHost:false,roomInfo:info});}});
        cln.current.push(u3,u4);u2();u();setPhase('wait');setStatus('');
      });
    });
    cln.current.push(u);
  };

  const handleAddBot=()=>{
    const players=waitPlayers;const cnt=Object.keys(players).length;

  };
  const handleRemoveBot=()=>{

  const handleStart=()=>{

    fbSet(`mp/${roomCode}/info/status`,'playing');
    cleanup();
    onStart({roomId:roomCode,myId,isHost:true,spectator:hostIsSpectator,roomInfo:{mpMode:settings.mpMode||'coop_adventure',maxPlayers:settings.maxPlayers||2,friendlyFire:!!settings.friendlyFire,difficulty:settings.difficulty||'normal',startWpn:myWpn,strikeThr:settings.strikeThr||7,pitchSens:settings.pitchSens||40}});
  };

  const handleLeave=()=>{
    cleanup();
    if(isHost)fbSet(`mp/${roomCode}`,null);
    else if(roomCode&&myId)fbSet(`mp/${roomCode}/players/${myId}`,null);
    setPhase('menu');setWaitPlayers({});setStatus('');setRoomCode('');setMyId('');setIsHost(false);
  };

  const pList=Object.values(waitPlayers).sort((a,b)=>(a.slot||0)-(b.slot||0));
  const modeLabel={coop_adventure:'🗺 Пригода кооп',coop_survival:'◈ Виживання кооп',duel_1v1:'⚔ Дуель 1v1',duel_2v2:'⚔ Дуель 2v2'};
  const InpSt={width:'100%',padding:'11px',background:'#060f1e',border:'1px solid #1e4a7f',color:'#e2e8f0',borderRadius:'6px',fontFamily:"'Courier New',monospace",fontSize:'12px',outline:'none',marginBottom:'8px'};

  return(<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px',gap:'8px',overflowY:'auto',fontFamily:"'Courier New',monospace"}}>
    {phase==='menu'&&(<>
      <div style={{textAlign:'center',marginBottom:'16px'}}>
        <div style={{fontSize:'20px',fontWeight:'bold',color:'#60a5fa',letterSpacing:'.15em'}}>МИР 13×13</div>
        <div style={{fontSize:'10px',color:'#1e4a7f',letterSpacing:'.25em',marginTop:'2px'}}>МУЛЬТИПЛЕЄР</div>
        <div style={{fontSize:'9px',color:'#334155',marginTop:'8px',background:'#060f1e',border:'1px solid #1e3a5f',borderRadius:'5px',padding:'4px 8px'}}>{modeLabel[settings.mpMode||'coop_adventure']} · {settings.maxPlayers||2}гр · {settings.friendlyFire?'🔥FF':'🛡NoFF'}</div>
      </div>
      {(()=>{const sess=loadSession();if(!sess)return null;return(<button onClick={()=>{cleanup();onStart({roomId:sess.roomId,myId:sess.myId,isHost:sess.isHost,spectator:sess.spectator,roomInfo:sess.roomInfo,reconnect:true});}} style={{width:'100%',maxWidth:'300px',padding:'11px',marginBottom:'10px',background:'#14532d33',border:'1px solid #22c55e',color:'#22c55e',borderRadius:'8px',cursor:'pointer',fontFamily:'inherit',fontSize:'11px',fontWeight:'bold'}}>↩ ПОВЕРНУТИСЬ У ГРУ (кімната {sess.roomId})</button>);})()}
      {(()=>{const pr=loadProg();return(<div style={{width:'100%',maxWidth:'300px',background:'#060f1e',border:'1px solid #1e3a5f',borderRadius:'8px',padding:'10px',marginBottom:'12px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>
          <span style={{fontSize:'13px',color:'#f59e0b',fontWeight:'bold'}}>⭐ Рівень {pr.level}</span>
          <span style={{fontSize:'9px',color:'#334155'}}>{pr.xp}/{xpForLevel(pr.level)} XP</span>
        </div>
        <div style={{height:'5px',background:'#020c1a',borderRadius:'3px',overflow:'hidden',marginBottom:'8px'}}><div style={{height:'100%',width:`${(pr.xp/xpForLevel(pr.level))*100}%`,background:'#f59e0b'}}/></div>
        <div style={{display:'flex',justifyContent:'space-around',fontSize:'8px',color:'#4a6a9f'}}>
          <span>⚔ {pr.kills}</span><span>💀 {pr.deaths}</span><span>🏆 {pr.wins}</span><span>🎮 {pr.games}</span><span>🥇 {pr.bestScore}</span>
        </div>
      </div>);})()}
      <B2 onClick={()=>{setHostIsSpectator(false);setPhase('create');}} col='#22c55e'>⚔ СТВОРИТИ КІМНАТУ</B2>
      <B2 onClick={()=>setPhase('join')} col='#3b82f6'>🔗 ПРИЄДНАТИСЬ</B2>
      <B2 onClick={()=>{setHostIsSpectator(true);setPhase('create_spec');}} col='#a78bfa'>👁 СТВОРИТИ ЯК СПОСТЕРІГАЧ</B2>
    </>)}
    {(phase==='create'||phase==='create_spec'||phase==='join')&&(<div style={{width:'100%',maxWidth:'360px'}}>
      <div style={{fontSize:'10px',color:'#1e4a7f',letterSpacing:'.1em',marginBottom:'12px'}}>{phase==='create'?'НОВА КІМНАТА':phase==='create_spec'?'👁 КІМНАТА (СПОСТЕРІГАЧ)':'ПРИЄДНАТИСЬ'}</div>
      <input value={myName} onChange={e=>setMyName(e.target.value)} placeholder="Ваше ім'я" maxLength={12} style={InpSt}/>
      {phase==='join'&&<input value={codeInput} onChange={e=>setCodeInput(e.target.value.toUpperCase())} placeholder="КОД КІМНАТИ" maxLength={5} style={{...InpSt,fontSize:'18px',letterSpacing:'.35em',textAlign:'center',color:'#60a5fa'}}/>}

          <span style={{color:'#334155',fontSize:'9px'}}>{p.wpn}</span>
          {settings.mpMode==='duel_2v2'&&<span style={{fontSize:'8px',color:(p.slot??i)<2?'#22c55e':'#ef4444',background:(p.slot??i)<2?'#14532d33':'#7f1d1d33',padding:'1px 5px',borderRadius:'3px'}}>{(p.slot??i)<2?'A':'B'}</span>}
        </div>))}
        <div style={{fontSize:'9px',color:'#1e3a5f',marginTop:'6px',textAlign:'center'}}>Гравців: {pList.length}/{settings.maxPlayers||2}</div>
      </div>
      {isHost&&pList.length<(settings.maxPlayers||2)&&<div style={{display:'flex',gap:'6px',marginBottom:'6px'}}>
        <button onClick={handleAddBot} style={{flex:1,padding:'9px',background:'#1e3a8a22',border:'1px solid #3b82f6',color:'#60a5fa',borderRadius:'6px',cursor:'pointer',fontFamily:'inherit',fontSize:'10px'}}>🤖 + БОТ</button>
        {pList.some(p=>p.isBot)&&<button onClick={handleRemoveBot} style={{flex:1,padding:'9px',background:'#7f1d1d22',border:'1px solid #ef4444',color:'#ef4444',borderRadius:'6px',cursor:'pointer',fontFamily:'inherit',fontSize:'10px'}}>🤖 − БОТ</button>}
      </div>}
      {isHost?<B2 onClick={handleStart} col='#22c55e' style={{opacity:pList.length<1?.35:1}}>▷ РОЗПОЧАТИ ({pList.length})</B2>:<div style={{fontSize:'10px',color:'#3b82f6',textAlign:'center',padding:'10px'}}>⏳ Очікуємо хоста...</div>}
      <B2 onClick={handleLeave} col='#ef4444' style={{marginTop:'6px'}}>✕ ПОКИНУТИ</B2>
      {status&&<div style={{fontSize:'10px',color:'#f59e0b',textAlign:'center',marginTop:'4px'}}>{status}</div>}
    </div>)}
  </div>);
}

function MPGame({roomId,myId,isHost,roomInfo,settings,onExit,spectator=false,reconnect=false}){
  const[,fr]=useReducer(x=>x+1,0);
  const myP=useRef(null);
  const allP=useRef({});
  const rs=useRef(null);
  const cln=useRef([]);
  const msgRef=useRef('');
  const msgTimer=useRef(null);
  const lastSync=useRef(0);
  const prevAccMag=useRef(9.8);
  const lastStrikeT=useRef(0);
  const doAttackRef=useRef(null);
  const localFlash=useRef({cells:[],until:0});
  const comboRef=useRef({count:0,last:0});
  const spellCdRef=useRef(0);
  const progRef=useRef(loadProg());
  const sessionStats=useRef({kills:0,deaths:0});
  const allDeadAtEnd=useRef(false);
  const hostHeartbeat=useRef(Date.now());
  const[hbTick,setHbTick]=useState(0);
  const info=roomInfo||{};
  const diff=info.difficulty||settings?.difficulty||'normal';
  const dCfg=DIFFICULTY[diff]||DIFFICULTY.normal;
  const mpMode=info.mpMode||'coop_adventure';
  const ff=!!info.friendlyFire;
  // World mode rendering — SAME as single-player Game
  const isRadar=settings?.worldMode==='radar';
  const isPanorama=settings?.worldMode==='panorama';
  const isRotated=isRadar||isPanorama;

  function setMsg(txt){msgRef.current=txt;fr();if(msgTimer.current)clearTimeout(msgTimer.current);msgTimer.current=setTimeout(()=>{msgRef.current='';fr();},4000);}
  function syncState(){
    if(!rs.current||!isHost)return;

    {(msgRef.current||g.msg)&&<div style={{fontSize:'10px',color:'#60a5fa',padding:'1px 8px',width:'100%',maxWidth:'480px',flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',animation:'fadeIn .2s'}}>{msgRef.current||g.msg}</div>}
    {g.transitionDir&&g.transitionTimer>0&&<div style={{width:'100%',maxWidth:'480px',padding:'1px 8px',flexShrink:0}}>
      <div style={{fontSize:'9px',color:'#22c55e',marginBottom:'2px'}}>{({N:'↑ ПІВНІЧ',S:'↓ ПІВДЕНЬ',E:'→ СХІД',W:'← ЗАХІД'}[g.transitionDir])} — перехід {g.transitionHint&&<span style={{color:'#f59e0b'}}>({g.transitionHint})</span>}</div>
      <div style={{height:'4px',background:'#020c1a',borderRadius:'2px',overflow:'hidden'}}><div style={{height:'100%',width:`${(g.transitionTimer/50)*100}%`,background:'#22c55e',transition:'width .1s'}}/></div>
    </div>}
    {!g.transitionDir&&g.peekHint&&<div style={{fontSize:'9px',color:'#a78bfa',padding:'1px 8px',width:'100%',maxWidth:'480px',flexShrink:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{g.peekHint} <span style={{color:'#334155'}}>· зберіть усіх</span></div>}
    {/* HUB direction compass — 4 archetypes */}
    {g.isHub&&!g.transitionDir&&(()=>{const rc=g.roomCoord||{x:META_CENTER,y:META_CENTER};const dirs=[['N','↑'],['W','←'],['E','→'],['S','↓']];return(<div style={{width:'100%',maxWidth:'480px',padding:'2px 8px',flexShrink:0,display:'flex',gap:'3px',justifyContent:'center'}}>
      {dirs.map(([d,arrow])=>{const nc=getNextCoord(rc,d);const ns=roomStyle(nc.x,nc.y);return(<div key={d} style={{flex:1,textAlign:'center',padding:'3px 2px',background:ns.bg,border:`1px solid ${ns.edge}`,borderRadius:'4px'}}>
        <div style={{fontSize:'11px',color:ns.accent}}>{arrow}{ns.sym}</div>
        <div style={{fontSize:'6px',color:ns.edge,whiteSpace:'nowrap',overflow:'hidden'}}>{ns.name}</div>
      </div>);})}
    </div>);})()}
    {/* GRID — IDENTICAL to single-player (worldMode/isRotated/isPanorama) */}
    <div style={isPanorama?{position:'fixed',inset:0,zIndex:1,background:'#010d1f',display:'grid',gridTemplateColumns:`repeat(${G},1fr)`,gridTemplateRows:`repeat(${G},1fr)`,transform:'perspective(600px) rotateX(55deg) scale(1.15)',transformOrigin:'50% 50%'}:{padding:'3px',background:g.roomStyle?.bg||'#010d1f',border:`2px solid ${g.roomStyle?.edge||'#1e4a7f'}`,borderRadius:'6px',margin:'2px 0',boxShadow:`0 0 12px ${(g.roomStyle?.edge||'#1e3a5f')}44`,transition:'all .5s'}}>
      <div style={{display:isPanorama?'contents':'grid',gridTemplateColumns:isPanorama?undefined:`repeat(${G},${cellSz}px)`,gap:'1px'}}>
        {Array.from({length:G*G},(_,idx2)=>{
          const sx=idx2%G,sy=Math.floor(idx2/G);
          const isP=!spectator&&(isRotated?(sx===CX&&sy===CY):(sx===(p.x||0)&&sy===(p.y||0)));
          const en=(g.enemies||[]).find(e=>{if(e.type==='boss')return false;const{sx:ex,sy:ey}=getPos(e.x,e.y);return ex===sx&&ey===sy;});
          const wc=wCells.find(c=>{const{sx:wx,sy:wy}=getPos(c.x,c.y);return wx===sx&&wy===sy;});
          const _allFlash=[...(g.flash||[]),...(localFlash.current.until>Date.now()?localFlash.current.cells:[])];
          const fl=_allFlash.find(c=>{const pos=isRotated?toScreen(c.x,c.y,p.x||0,p.y||0,p.compassD||0):{sx:c.x,sy:c.y};return pos.sx===sx&&pos.sy===sy;});
          const _wc=isRotated?fromScreen(sx,sy,p.x||0,p.y||0,p.compassD||0):{gx:sx,gy:sy};
          const isVoid=isRotated&&(_wc.gx<0||_wc.gx>=G||_wc.gy<0||_wc.gy>=G);
          const isEdge=!isVoid&&(_wc.gx===0||_wc.gx===G-1||_wc.gy===0||_wc.gy===G-1);
          const cellObj=(g.objects||[]).find(o=>{const{sx:ox,sy:oy}=getPos(o.x,o.y);return ox===sx&&oy===sy;});
          const cellBoss=(g.enemies||[]).find(e=>e.type==='boss'&&calcBossCells(e.x,e.y,e.size||1).some(bc=>{const{sx:bsx,sy:bsy}=getPos(bc.x,bc.y);return bsx===sx&&bsy===sy;}));
          const otherPs=pList.filter(q=>{if(q.isSpectator||!q.alive)return false;if(!spectator&&(q.id||q.name)===myId)return false;const{sx:qsx,sy:qsy}=getPos(q.x||0,q.y||0);return qsx===sx&&qsy===sy;});
          let bg=isVoid?'#000000':isEdge?'#040e1a':'#020c1a';
          let bdr=isVoid?'none':isEdge?'2px solid #2a5a9f':'1px solid #091c30';
          if(fl)bg=fl.col+'55';
          else if(isP){bg='#14532d';bdr='1px solid #22c55e';}
          else if(en&&ET[en.type]){bg=ET[en.type].col+'22';bdr=`1px solid ${ET[en.type].col}`;}
          else if(cellBoss){bg=cellBoss.col+'22';bdr=`2px solid ${cellBoss.col}`;}
          else if(cellObj&&!OBJ_TYPES[cellObj.type]?.isLoot){const ot=OBJ_TYPES[cellObj.type];bg=ot.destructible?'#92400e33':'#37415144';bdr=`1px solid ${ot.col}`;}
          else if(wc){bg=wc.extra?'#f9731344':wc.main?'#1e3a8a44':'#1e3a8a18';bdr=`1px solid ${wc.extra?'#f97316':wc.main?'#3b82f6':'#1e3a5f'}`;}
          return(<div key={idx2} style={{width:isPanorama?'100%':`${cellSz}px`,height:isPanorama?'100%':`${cellSz}px`,background:bg,border:bdr,borderRadius:'2px',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',fontSize:`${cellSz*.44}px`}}>
            {!isVoid&&en&&ET[en.type]&&<span style={{color:(en.frozen&&en.frozen>Date.now())?'#67e8f9':ET[en.type].col}}>{ET[en.type].sym}</span>}
            {!isVoid&&!en&&cellBoss&&<span style={{color:cellBoss.col,fontWeight:'bold'}}>{cellBoss.x===sx&&cellBoss.y===sy?cellBoss.sym:'·'}</span>}
            {!isVoid&&!en&&!cellBoss&&cellObj&&(()=>{const ot=OBJ_TYPES[cellObj.type];return<span style={{color:ot.col,opacity:ot.destructible&&cellObj.hp?(0.4+(cellObj.hp/3)*0.6):1}}>{ot.sym}</span>;})()}
            {!isVoid&&wc?.extra&&<span style={{color:'#f9731688',fontSize:`${cellSz*.28}px`,position:'absolute'}}>+</span>}
            {!isVoid&&otherPs.map((q,i)=>(<div key={q.id||i} style={{position:'absolute',width:`${cellSz*.42}px`,height:`${cellSz*.42}px`,borderRadius:'50%',background:PCOL[q.slot??i+1],border:'1px solid rgba(255,255,255,.5)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:`${cellSz*.2}px`,color:'white',fontWeight:'bold'}}>{(q.name||'?')[0]}</div>))}
            {!isVoid&&isP&&<div style={{position:'absolute',width:`${cellSz*.44}px`,height:`${cellSz*.44}px`,borderRadius:'50%',background:PCOL[p.slot||0],border:'2px solid rgba(255,255,255,.85)',boxShadow:`0 0 ${cellSz*.3}px ${PCOL[p.slot||0]}`,zIndex:2,opacity:p.spell?.fn==='stealth'&&p.spell.until>Date.now()?0.4:1}}><div style={{position:'absolute',top:'50%',left:'50%',transform:`translate(-50%,-50%) rotate(${(p.yawIdx||0)*45}deg)`,fontSize:`${cellSz*.3}px`,lineHeight:1}}>↑</div></div>}
          </div>);
        })}
      </div>
    </div>
    {/* Bottom bar */}
    <div style={{width:'100%',maxWidth:'480px',padding:'1px 8px',flexShrink:0,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontSize:'8px',color:spectator?'#a78bfa':'#1e3a5f'}}>{spectator?'👁 РЕЖИМ СПОСТЕРІГАЧА':'свайп-рух · мах/тап-удар'}</span>
      <span style={{fontSize:'8px',color:'#334155'}}>{spectator?`${Object.values(allP).filter(x=>x.alive&&!x.isSpectator).length} живих`:`${p.wpn}${(p.weaponMods?.reach||0)>0?` 🔭+${p.weaponMods.reach}кл`:''}`}</span>
    </div>
    {/* MorseBar */}
    {!spectator&&<>
      {spellCdRef.current>Date.now()&&<div style={{width:'100%',maxWidth:'480px',padding:'1px 8px',flexShrink:0}}>
        <div style={{height:'3px',background:'#020c1a',borderRadius:'2px',overflow:'hidden'}}><div style={{height:'100%',width:`${Math.max(0,100-((spellCdRef.current-Date.now())/SPELL_CD)*100)}%`,background:'#a78bfa',transition:'width .1s'}}/></div>
      </div>}
      <MorseBar currentSeq={p.morseSeq||''} unlocked={p.unlocked||[]}/>
    </>}
    {/* Dead overlay */}
    {!spectator&&!p.alive&&!allDead&&!g.gameOver&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.82)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:30,fontFamily:"'Courier New',monospace"}}>
      <div style={{color:'#ef4444',fontSize:'22px',fontWeight:'bold',letterSpacing:'.2em',animation:'shake .4s'}}>ЗАГИНУВ</div>
      {(mpMode==='coop_adventure'||mpMode==='coop_survival')?<div style={{color:'#22c55e',fontSize:'13px',marginTop:'10px'}}>♻ Відродження за {Math.max(0,Math.ceil((5000-(Date.now()-(p._deadAt||Date.now())))/1000))}с</div>:<div style={{color:'#4a6a9f',fontSize:'10px',marginTop:'8px'}}>Спостерігай за союзниками...</div>}
    </div>}
    {!isHost&&hostHeartbeat.current>0&&(Date.now()-hostHeartbeat.current>4000)&&!g.gameOver&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.88)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:32,gap:'10px',fontFamily:"'Courier New',monospace"}}>
      <div style={{color:'#f59e0b',fontSize:'18px',fontWeight:'bold',letterSpacing:'.15em',animation:'pulse 1.5s infinite'}}>⏸ ПАУЗА</div>
      <div style={{color:'#94a3b8',fontSize:'11px'}}>Хост вийшов з гри</div>
      <div style={{color:'#4a6a9f',fontSize:'9px'}}>Очікуємо повернення хоста...</div>
      <B2 onClick={onExit} col='#ef4444' style={{maxWidth:'180px',marginTop:'12px'}}>✕ Покинути</B2>
    </div>}
    {(g.gameOver||(allDead&&(mpMode==='coop_adventure'||mpMode==='coop_survival')))&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:31,gap:'12px',fontFamily:"'Courier New',monospace"}}>
      <div style={{color:g.winner?'#22c55e':'#ef4444',fontSize:'18px',fontWeight:'bold',letterSpacing:'.15em',animation:'pulse 2s infinite'}}>{g.winner?`🏆 ${g.winner} перемогли!`:'КОМАНДА ЗАГИНУЛА'}</div>
      <div style={{color:'#f59e0b',fontSize:'12px'}}>Рахунок: {g.score||0}</div>
      <B2 onClick={onExit} col='#3b82f6' style={{maxWidth:'200px',marginTop:'8px'}}>← МЕНЮ</B2>
    </div>}
  </div>);
}

// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const[screen,setScreen]=useState('warning');
  const[sPhase,setSPhase]=useState('idle');
  const[S,setS]=useState({worldMode:'classic',strikeThr:7,pitchSens:40,startWpn:'sword',voice:true,difficulty:'normal',language:'uk',mpMode:'coop_adventure',maxPlayers:2,friendlyFire:false});
  const[gameParams,setGameParams]=useState(null);
  const[fbOk,setFbOk]=useState(false);
  const t=key=>TR[S.language]?.[key]??TR.uk[key]??key;

  useEffect(()=>{const c=setInterval(()=>{if(window._fbReady){setFbOk(true);clearInterval(c);}},100);return()=>clearInterval(c);},[]);

  const onStart=useCallback((params)=>{setGameParams(params);setScreen('mpgame');},[]);

  // Warning screen (same as SP)
  if(screen==='warning')return(<Warning onOk={()=>setScreen('lobby')} setSPhase={setSPhase} t={t}/>);

  // Wait for Firebase after warning
  if(!fbOk)return(<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'8px',background:'#010d1f',fontFamily:"'Courier New',monospace"}}>
    <div style={{color:'#3b82f6',fontSize:'12px',letterSpacing:'.15em'}}>МИР 13×13 МП</div>
    <div style={{color:'#1e4a7f',fontSize:'9px'}}>Firebase...</div>
  </div>);

  // Settings screen — identical to SP, with isMp=true adds MP sections
  if(screen==='settings')return(
    <div style={{flex:1,display:'flex',flexDirection:'column',background:'#010d1f',minHeight:0,height:'100%'}}>
      <div style={{padding:'6px 12px',background:'#060f1e',borderBottom:'1px solid #1e3a5f',flexShrink:0,display:'flex',alignItems:'center',gap:'8px',cursor:'pointer'}} onClick={()=>setScreen(screen==='settings'?'lobby':'settings')}>
        <span style={{fontSize:'10px',color:'#4a6a9f'}}>←</span>
        <span style={{fontSize:'10px',color:'#3b82f6',letterSpacing:'.1em'}}>НАЗАД</span>
      </div>
      <Settings s={S} setS={setS} sPhase={sPhase} setSPhase={setSPhase} onBack={()=>setScreen('lobby')} t={t} isMp={true}/>
    </div>
  );

  // MP Game screen
  if(screen==='mpgame'&&gameParams)return(<MPGame {...gameParams} settings={S} spectator={gameParams.spectator||false} reconnect={gameParams.reconnect||false} onExit={()=>{clearSession();setGameParams(null);setScreen('lobby');}}/>);

  // Lobby / Menu
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',background:'#010d1f'}}>
      <div style={{padding:'4px 10px',background:'#060f1e',borderBottom:'1px solid #1e3a5f',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <span style={{fontSize:'11px',color:'#60a5fa',fontWeight:'bold',letterSpacing:'.1em',fontFamily:"'Courier New',monospace"}}>МИР 13×13 МП</span>
        <button onClick={()=>setScreen('settings')} style={{background:'none',border:'none',color:'#334155',cursor:'pointer',fontSize:'16px',padding:'2px 6px',fontFamily:"'Courier New',monospace"}}>⚙</button>
      </div>
      <Lobby settings={S} onStart={onStart} t={t}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
